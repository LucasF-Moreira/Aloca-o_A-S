// ─── Pulse View ───────────────────────────────────────────────────────────────
function PulseView({projects, ciclos, allAnalysts, onSave, saving, token}) {
  const [filters,     setFilters]     = useState({ciclo:'', analista:'', head:'', ka:'', client:'', nome:''});
  const [editProject, setEditProject] = useState(null);
  const [editLoading, setEditLoading] = useState(false);
  const [editError,   setEditError]   = useState('');

  // Only SP projects are editable via Pulse
  const spProjects = projects.filter(p=>p.source==='sharepoint');

  const filtered = useMemo(()=>spProjects.filter(p=>{
    if (filters.ciclo   && p.ciclo!==filters.ciclo) return false;
    if (filters.client  && !(p.client||'').toLowerCase().includes(filters.client.toLowerCase())) return false;
    if (filters.nome    && !(p.title||'').toLowerCase().includes(filters.nome.toLowerCase())) return false;
    if (filters.ka      && !(p.ka||'').toLowerCase().includes(filters.ka.toLowerCase())) return false;
    if (filters.analista && !p.analysts.some(a=>(a||'').toLowerCase().includes(filters.analista.toLowerCase()))) return false;
    if (filters.head    && ![p.head1,p.head2,p.head3].some(h=>(h||'').toLowerCase().includes(filters.head.toLowerCase()))) return false;
    return true;
  }), [spProjects, filters]);

  const hasFilters = Object.values(filters).some(Boolean);

  // Lazy-load: busca o item completo (sem $select) somente ao abrir o modal de edição
  async function handleEditClick(proj) {
    setEditError('');
    setEditLoading(true);
    try {
      const raw = await fetchSPItemFull(token, SP_SITE_URL, SP_LIST_NAME, proj.spId);
      // Extrai campos Pulse do item completo
      const pulseData = {};
      PULSE_FIELDS.forEach(f=>{
        const v = raw[f.k];
        pulseData[f.k] = (f.t==='date') ? (fmtDateForInput(v)||'') : (v!==undefined&&v!==null ? String(v) : '');
      });
      setEditProject({...proj, pulseData});
    } catch(e) {
      setEditError('Erro ao carregar campos: '+e.message);
    } finally {
      setEditLoading(false);
    }
  }

  async function handleSave(updated) {
    await onSave(updated);
    setEditProject(null);
  }

  if (spProjects.length===0) return (
    <div className="mt-16 text-center text-slate-400">
      <p className="text-4xl mb-3">📋</p>
      <p className="text-lg font-medium">Nenhum registro da List_Pulse carregado.</p>
    </div>
  );

  return (
    <div className="fade-in max-w-screen-2xl mx-auto px-4 pb-10 mt-4 space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-lg font-bold text-slate-800">List_Pulse</h2>
        <span className="text-xs text-slate-500">{filtered.length} de {spProjects.length} registros</span>
      </div>

      {/* Filter bar */}
      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">Ciclo Orç.</label>
            <select value={filters.ciclo} onChange={e=>setFilters(f=>({...f,ciclo:e.target.value}))}
              className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200 bg-white">
              <option value="">Todos</option>
              {ciclos.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          {[
            {key:'nome',     label:'Nome do Processo'},
            {key:'client',   label:'Cliente'},
            {key:'ka',       label:'KA'},
            {key:'head',     label:'Head (1/2/3)'},
            {key:'analista', label:'Analista'},
          ].map(f=>(
            <div key={f.key}>
              <label className="block text-xs font-medium text-slate-500 mb-1">{f.label}</label>
              <input value={filters[f.key]} onChange={e=>setFilters(ff=>({...ff,[f.key]:e.target.value}))}
                placeholder="Buscar..."
                className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200"/>
            </div>
          ))}
        </div>
        {hasFilters&&(
          <button onClick={()=>setFilters({ciclo:'',analista:'',head:'',ka:'',client:'',nome:''})}
            className="mt-3 text-xs text-indigo-600 hover:text-indigo-800 font-medium">
            ✕ Limpar filtros
          </button>
        )}
      </div>

      {/* Results table */}
      <div className="scroll-table bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="min-w-full text-xs border-collapse">
          <thead>
            <tr className="bg-slate-50 border-b border-slate-200">
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">#</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 min-w-52">Nome do Processo</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Cliente</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Status</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Ciclo</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">KA</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Head 1</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Head 2</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Head 3</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 min-w-40">Analistas</th>
              <th className="px-3 py-2.5 text-center font-semibold text-slate-500 sticky right-0 bg-slate-50"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {filtered.length===0&&(
              <tr><td colSpan={11} className="text-center text-slate-400 py-10">Nenhum registro encontrado.</td></tr>
            )}
            {filtered.map(proj=>(
              <tr key={proj.id} className="hover:bg-slate-50 transition">
                <td className="px-3 py-2 text-slate-400 whitespace-nowrap">{proj.indice}</td>
                <td className="px-3 py-2 font-medium text-slate-800">{proj.title}</td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.client||'—'}</td>
                <td className="px-3 py-2 whitespace-nowrap"><StatusBadge status={proj.status}/></td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.ciclo||'—'}</td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.ka||'—'}</td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.head1||'—'}</td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.head2||'—'}</td>
                <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{proj.head3||'—'}</td>
                <td className="px-3 py-2 text-slate-500 max-w-xs truncate">
                  {proj.analysts.filter(Boolean).join(', ')||'—'}
                </td>
                <td className="px-3 py-2 text-center sticky right-0 bg-white border-l border-slate-100">
                  <button onClick={()=>handleEditClick(proj)} disabled={editLoading}
                    className="text-xs text-indigo-600 hover:text-indigo-800 border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition whitespace-nowrap disabled:opacity-50">
                    {editLoading?'⏳':'Editar'}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Error ao buscar campos do item */}
      {editError&&(
        <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700 flex items-center justify-between">
          <span>{editError}</span>
          <button onClick={()=>setEditError('')} className="ml-3 text-red-400 hover:text-red-600">✕</button>
        </div>
      )}

      {editProject&&(
        <PulseEditModal
          project={editProject}
          allAnalysts={allAnalysts}
          onSave={handleSave}
          onClose={()=>setEditProject(null)}
          saving={saving}
        />
      )}
    </div>
  );
}

// ─── Pulse Edit Modal (all List_Pulse fields, collapsible sections) ───────────
function PulseEditModal({project, allAnalysts, onSave, onClose, saving}) {
  // Core fields
  const [title,    setTitle]    = useState(project?.title||'');
  const [client,   setClient]   = useState(project?.client||'');
  const [status,   setStatus]   = useState(project?.status||'');
  const [ciclo,    setCiclo]    = useState(project?.ciclo||'');
  const [ka,       setKa]       = useState(project?.ka||'');
  const [head1,    setHead1]    = useState(project?.head1||'');
  const [head2,    setHead2]    = useState(project?.head2||'');
  const [head3,    setHead3]    = useState(project?.head3||'');
  // Analysts & phases
  const [analysts, setAnalysts] = useState(project?.analysts ? [...project.analysts] : []);
  const [phases,   setPhases]   = useState(()=>{
    const p={}; PHASES.forEach(ph=>{
      const ex=project?.phases?.[ph.key];
      p[ph.key]={start:fmtDateForInput(ex?.start)||'',end:fmtDateForInput(ex?.end)||'',pcts:ex?.pcts?[...ex.pcts]:[]};
    }); return p;
  });
  // Pulse extra fields
  const [pulseData, setPulseData] = useState(()=>{
    const d={}; PULSE_FIELDS.forEach(f=>{d[f.k]=project?.pulseData?.[f.k]||'';}); return d;
  });
  // Section collapse state — start all collapsed except first two
  const [collapsed, setCollapsed] = useState(()=>{
    const c={};
    PULSE_SECTIONS.forEach((s,i)=>{ c[s]=i>=2; }); // first 2 sections open, rest collapsed
    c['_identificacao_basica'] = false;
    c['Analistas e Fases'] = false;
    return c;
  });

  function toggleSec(s) { setCollapsed(c=>({...c,[s]:!c[s]})); }
  function updatePulse(k,v) { setPulseData(p=>({...p,[k]:v})); }

  function syncPctsLength(newA,prevPh){
    const u={}; PHASES.forEach(ph=>{ const c=prevPh[ph.key].pcts||[]; u[ph.key]={...prevPh[ph.key],pcts:newA.map((_,i)=>c[i]||0)}; }); return u;
  }
  function addAnalyst(){ const a=[...analysts,'']; setAnalysts(a); setPhases(p=>syncPctsLength(a,p)); }
  function removeAnalyst(idx){
    const a=analysts.filter((_,i)=>i!==idx); setAnalysts(a);
    setPhases(p=>{ const u={}; PHASES.forEach(ph=>{ const pc=[...p[ph.key].pcts]; pc.splice(idx,1); u[ph.key]={...p[ph.key],pcts:pc}; }); return u; });
  }
  function updAnalystName(idx,v){ setAnalysts(p=>p.map((a,i)=>i===idx?v:a)); }
  function updPhaseField(ph,f,v){ setPhases(p=>({...p,[ph]:{...p[ph],[f]:v}})); }
  function updPct(ph,idx,v){ setPhases(p=>{ const pc=[...p[ph].pcts]; pc[idx]=Math.max(0,parseFloat(v)||0); return {...p,[ph]:{...p[ph],pcts:pc}}; }); }

  function handleSave(){
    if (!title.trim()) return;
    const fA=analysts.filter(a=>a.trim());
    const fPh={}; PHASES.forEach(ph=>{ const pc=analysts.map((a,i)=>a.trim()?phases[ph.key].pcts[i]||0:null).filter(p=>p!==null); fPh[ph.key]={...phases[ph.key],pcts:pc}; });
    onSave({...project, title:title.trim(), client:client.trim(), status, ciclo:ciclo.trim(),
      ka:ka.trim(), head1:head1.trim(), head2:head2.trim(), head3:head3.trim(),
      analysts:fA, phases:fPh, pulseData});
  }

  // Shared input classes
  const cls = 'w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200';

  // Render a single PULSE_FIELDS entry
  function renderPulseField(f){
    const v=pulseData[f.k]||'';
    if (f.t==='select') return (
      <select value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}>
        <option value="">—</option>
        {(f.o||[]).map(op=><option key={op} value={op}>{op}</option>)}
      </select>
    );
    if (f.t==='textarea') return <textarea value={v} onChange={e=>updatePulse(f.k,e.target.value)} rows={3} className={cls+' resize-none'}/>;
    if (f.t==='date') return <input type="date" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
    if (f.t==='number') return <input type="number" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
    return <input type="text" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
  }

  // Section header button
  function SecHeader({id,label,icon,count}){
    const open=!collapsed[id];
    return (
      <button onClick={()=>toggleSec(id)} className="w-full flex items-center gap-2 text-left py-1">
        <span className="text-sm">{icon}</span>
        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest flex-1">{label}</span>
        {count&&<span className="text-xs text-slate-400">{count} campos</span>}
        <span className={`text-slate-400 text-xs transition-transform ${open?'rotate-180':''}`}>▾</span>
      </button>
    );
  }

  // Render a section from PULSE_FIELDS (excluding Etapas)
  function renderSection(sLabel){
    const fields=PULSE_FIELDS.filter(f=>f.s===sLabel&&!f.etapa);
    if (!fields.length) return null;
    return (
      <section key={sLabel} className="border border-slate-200 rounded-xl overflow-hidden">
        <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
          <SecHeader id={sLabel} label={sLabel} count={fields.length}/>
        </div>
        {!collapsed[sLabel]&&(
          <div className="px-4 py-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
            {fields.map(f=>(
              <div key={f.k} className={f.w?'sm:col-span-2':''}>
                <label className="block text-xs font-medium text-slate-600 mb-1">{f.l}</label>
                {renderPulseField(f)}
              </div>
            ))}
          </div>
        )}
      </section>
    );
  }

  const normalSections = PULSE_SECTIONS.filter(s=>s!=='Etapas de Avaliação');

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col mx-4"
        onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0 rounded-t-2xl">
          <div>
            <h2 className="text-lg font-bold text-slate-800">Editar — Pulse</h2>
            <p className="text-xs text-slate-400 mt-0.5">#{project?.indice} · {project?.title}</p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setCollapsed(c=>{const n={};Object.keys(c).forEach(k=>{n[k]=false;});return n;})}
              className="text-xs text-indigo-600 hover:text-indigo-800 border border-indigo-200 px-2 py-1 rounded-lg">
              Expandir tudo
            </button>
            <button onClick={onClose} className="text-slate-400 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">✕</button>
          </div>
        </div>

        {/* Scrollable body */}
        <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">

          {/* ── Identificação Básica ── */}
          <section className="border border-slate-200 rounded-xl overflow-hidden">
            <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
              <SecHeader id="_identificacao_basica" label="Identificação Básica" icon="🏷️"/>
            </div>
            {!collapsed['_identificacao_basica']&&(
              <div className="px-4 py-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div className="sm:col-span-2">
                  <label className="block text-xs font-medium text-slate-600 mb-1">Nome do Processo *</label>
                  <input value={title} onChange={e=>setTitle(e.target.value)} className={cls} placeholder="Nome do programa"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Cliente</label>
                  <input value={client} onChange={e=>setClient(e.target.value)} className={cls}/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Status do Programa</label>
                  <select value={status} onChange={e=>setStatus(e.target.value)} className={cls}>
                    <option value="">—</option>

                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Ciclo Orçamentário</label>
                  <input value={ciclo} onChange={e=>setCiclo(e.target.value)} className={cls} placeholder="Ex: 2026"/>

                {/* Identificação PULSE_FIELDS */}
                {PULSE_FIELDS.filter(f=>f.s==='Identificação').map(f=>(
                  <div key={f.k} className={f.w?'sm:col-span-2':''}>

                  <input value={head2} onChange={e=>setHead2(e.target.value)} className={cls}/></div>

            {saving?'⏳ Salvando...':'💾 Salvar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Overview Panel (status cards + phase distribution + active phases tree) ──
function CalOverview({ events, today }) {
  const [expanded, setExpanded] = useState(true);

  const classified = useMemo(() =>
    events.map(e => ({ ...e, status: calPhaseStatus(e.start, e.end, today) }))
  , [events, today]);

  // Status counts
  const statusCounts = useMemo(() => {
    const c = { planned:0, active:0, warning:0, critical:0, done:0 };
    classified.forEach(e => { if (c[e.status]!==undefined) c[e.status]++; });
    return c;
  }, [classified]);

  // Phase distribution (unique project-phase pairs, count per phase)
  const phaseCounts = useMemo(() => {
    const c = {};
    classified.forEach(e => { c[e.phaseKey]=(c[e.phaseKey]||0)+1; });
    return c;
  }, [classified]);

  // Active phases (non-done) grouped by client, sorted by status priority
  const activeByClient = useMemo(() => {
    const active = classified.filter(e => e.status !== 'done');
    const map = {};
    active.forEach(e => {
      const c = e.client||'(sem cliente)';
      if (!map[c]) map[c] = [];
      map[c].push(e);
    });
    // Sort each client's events by status priority then start date
    Object.values(map).forEach(arr => arr.sort((a,b) => {
      const si = CAL_STATUS_ORDER.indexOf(a.status);
      const sj = CAL_STATUS_ORDER.indexOf(b.status);
      return si!==sj ? si-sj : a.start-b.start;
    }));
    return Object.entries(map).sort(([a],[b]) => a.localeCompare(b));
  }, [classified]);

  return (
    <div className="mb-8">

      {/* ── Status summary cards ── */}
      <div className="grid grid-cols-2 sm:grid-cols-5 gap-4 mb-6">
        {CAL_STATUS_ORDER.map(s => {
          const st = CAL_STATUS[s];
          const count = statusCounts[s] || 0;
          return (
            <div key={s} className="bg-white rounded-2xl border border-slate-200 p-5 flex items-center gap-4 hover:shadow-md transition-shadow">
              <span className="text-3xl leading-none">{st.emoji}</span>
              <div>
                <div className="text-2xl font-bold text-slate-900 leading-tight">{count}</div>
                <div className="text-xs text-slate-500 mt-0.5">{st.label}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Phase distribution ── */}
      {Object.keys(phaseCounts).length > 0 && (
        <div className="bg-white rounded-2xl border border-slate-200 p-5 mb-5">
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">
            Projetos por fase — período filtrado
          </div>
          <div className="flex flex-wrap gap-3">
            {PHASES.filter(ph => phaseCounts[ph.key]).map(ph => (
              <div key={ph.key}
                className="flex items-center gap-2.5 px-4 py-2 rounded-xl border text-sm font-semibold"
                style={{borderColor:CAL_COLORS[ph.key], color:CAL_COLORS[ph.key], background:CAL_COLORS[ph.key]+'18'}}>
                <span>{ph.label}</span>
                <span className="text-base font-bold leading-none">{phaseCounts[ph.key]}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Fases em andamento (client tree) ── */}
      {activeByClient.length > 0 && (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <button
            onClick={() => setExpanded(x => !x)}
            className="w-full flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Fases em andamento</span>
              <span className="text-xs bg-emerald-100 text-emerald-700 font-semibold px-2 py-0.5 rounded-full">
                {activeByClient.reduce((s,[,evts])=>s+evts.length,0)} fases
              </span>
            </div>
            <span className="text-slate-400 text-sm">{expanded ? '▲' : '▼'}</span>
          </button>

          {expanded && (
            <div className="border-t border-slate-100 divide-y divide-slate-50">
              {activeByClient.map(([client, evts]) => (
                <div key={client} className="px-6 py-5">
                  {/* Client row */}
                  <div className="flex items-center gap-2.5 mb-4">
                    <div className="w-7 h-7 rounded-lg bg-slate-100 flex items-center justify-center text-sm shrink-0">🏢</div>
                    <span className="text-sm font-bold text-slate-800">{client}</span>
                    <span className="text-xs text-slate-400">({evts.length} fase{evts.length!==1?'s':''})</span>
                  </div>
                  {/* Project rows */}
                  <div className="space-y-3 ml-2">
                    {evts.map((e, ei) => {
                      const st = CAL_STATUS[e.status];
                      const isLast = ei === evts.length - 1;
                      const daysLeft = e.status !== 'planned'
                        ? Math.round((e.end - today) / 864e5)
                        : Math.round((e.start - today) / 864e5);
                      return (
                        <div key={e.id} className="flex items-start gap-3">
                          {/* Tree line */}
                          <span className="text-slate-200 text-sm mt-0.5 shrink-0 font-mono select-none">
                            {isLast ? '└' : '├'}
                          </span>
                          {/* Status dot */}
                          <div className="w-2 h-2 rounded-full mt-2 shrink-0" style={{background:st.color}}/>
                          {/* Content */}
                          <div className="flex-1 min-w-0 pb-1">
                            <div className="flex flex-wrap items-center gap-2">
                              <span className="text-sm font-semibold text-slate-800">{e.projTitle}</span>
                              <span className="text-xs px-2 py-0.5 rounded-full font-medium"
                                style={{background:CAL_COLORS[e.phaseKey]+'22',color:CAL_COLORS[e.phaseKey]}}>
                                {e.phaseLabel}
                              </span>
                              <span className="text-xs font-medium" style={{color:st.color}}>
                                {e.status==='planned'
                                  ? `começa em ${daysLeft}d`
                                  : e.status==='done'
                                  ? 'finalizado'
                                  : daysLeft<=0
                                  ? `atrasado ${Math.abs(daysLeft)}d`
                                  : `${daysLeft}d restante${daysLeft!==1?'s':''}`}
                              </span>
                            </div>
                            <div className="text-xs text-slate-400 mt-1.5">
                              {calFmt(e.start)} <span className="text-slate-200 mx-1">→</span> {calFmt(e.end)}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {activeByClient.length === 0 && events.length === 0 && (
        <div className="bg-white rounded-2xl border border-slate-200 p-10 text-center text-slate-400 text-sm">
          Nenhuma fase encontrada. Ajuste os filtros para ver o cronograma.
        </div>
      )}
    </div>
  );
}

// ── CalendarView (main) ──
function CalendarView({ projects, ciclos }) {
  const today = calSoD(new Date());
  const [viewMode, setViewMode]             = useState('month');
  const [navDate, setNavDate]               = useState(calSoD(today));
  const [filterCiclo, setFilterCiclo]       = useState('');
  const [filterProjeto, setFilterProjeto]   = useState('');
  const [filterCliente, setFilterCliente]   = useState('');
  const [filterDateStart, setFilterDateStart] = useState('');
  const [filterDateEnd, setFilterDateEnd]   = useState('');
  const [selectedDay, setSelectedDay]       = useState(null);

  // Build events list from all project phases
  const allEvents = useMemo(() => {
    const evts = [];
    (projects||[]).forEach(proj => {
      PHASES.forEach(ph => {
        const phase = proj.phases?.[ph.key];
        if (!phase?.start || !phase?.end) return;
        const start = parseSPDate(phase.start);
        const end   = parseSPDate(phase.end);
        if (!start || !end || isNaN(start) || isNaN(end)) return;
        evts.push({
          id:         `${proj.id}-${ph.key}`,
          projId:     proj.id,
          projTitle:  proj.title,
          client:     proj.client||'',
          ciclo:      proj.ciclo||'',
          phaseKey:   ph.key,
          phaseLabel: ph.label,
          start:      calSoD(start),
          end:        calSoD(end),
          color:      CAL_COLORS[ph.key]||'#64748b',
        });
      });
    });
    return evts;
  }, [projects]);

  // Apply filters
  const events = useMemo(() => {
    return allEvents.filter(e => {
      if (filterCiclo   && e.ciclo !== filterCiclo)                                          return false;
      if (filterProjeto && !e.projTitle.toLowerCase().includes(filterProjeto.toLowerCase())) return false;
      if (filterCliente && !e.client.toLowerCase().includes(filterCliente.toLowerCase()))    return false;
      if (filterDateStart) { const fs=parseSPDate(filterDateStart); if (fs&&e.end<fs)   return false; }
      if (filterDateEnd)   { const fe=parseSPDate(filterDateEnd);   if (fe&&e.start>fe) return false; }
      return true;
    });
  }, [allEvents, filterCiclo, filterProjeto, filterCliente, filterDateStart, filterDateEnd]);

  function navPrev() {
    const d=new Date(navDate);
    if (viewMode==='month') d.setMonth(d.getMonth()-1);
    else if (viewMode==='week') d.setDate(d.getDate()-7);
    else d.setDate(d.getDate()-1);
    setNavDate(d);
  }
  function navNext() {
    const d=new Date(navDate);
    if (viewMode==='month') d.setMonth(d.getMonth()+1);
    else if (viewMode==='week') d.setDate(d.getDate()+7);
    else d.setDate(d.getDate()+1);
    setNavDate(d);
  }

  let navTitle='';
  if (viewMode==='month') {
    navTitle=`${CAL_MONTH_NAMES[navDate.getMonth()]} ${navDate.getFullYear()}`;
  } else if (viewMode==='week') {
    const wk=calGetWeekDays(navDate);
    navTitle=`${calFmt(wk[0]).slice(0,5)} – ${calFmt(wk[6])}`;
  } else {
    navTitle=calFmt(navDate);
  }

  const dayModalEvents = selectedDay
    ? events.filter(e=>e.start<=selectedDay&&e.end>=selectedDay).sort((a,b)=>a.start-b.start)
    : [];

  const hasFilters = filterCiclo||filterProjeto||filterCliente||filterDateStart||filterDateEnd;

  return (
    <div className="max-w-screen-xl mx-auto px-4 pb-12">

      {/* ── Filter bar ── */}
      <div className="bg-white rounded-2xl border border-slate-200 px-5 py-4 mb-6 mt-3 flex flex-wrap gap-4 items-end">
        <div>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide block mb-1.5">Ciclo</label>
          <select value={filterCiclo} onChange={e=>setFilterCiclo(e.target.value)}
            className="text-sm border border-slate-200 rounded-xl px-3 py-2 bg-white text-slate-700 min-w-[130px] focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400">
            <option value="">Todos</option>
            {(ciclos||[]).map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide block mb-1.5">Projeto</label>
          <input value={filterProjeto} onChange={e=>setFilterProjeto(e.target.value)}
            placeholder="buscar…" className="text-sm border border-slate-200 rounded-xl px-3 py-2 w-40 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400"/>
        </div>
        <div>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide block mb-1.5">Cliente</label>
          <input value={filterCliente} onChange={e=>setFilterCliente(e.target.value)}
            placeholder="buscar…" className="text-sm border border-slate-200 rounded-xl px-3 py-2 w-40 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400"/>
        </div>
        <div>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide block mb-1.5">De</label>
          <input type="date" value={filterDateStart} onChange={e=>setFilterDateStart(e.target.value)}
            className="text-sm border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400"/>
        </div>
        <div>
          <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide block mb-1.5">Até</label>
          <input type="date" value={filterDateEnd} onChange={e=>setFilterDateEnd(e.target.value)}
            className="text-sm border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400"/>
        </div>
        {hasFilters&&(
          <button onClick={()=>{setFilterCiclo('');setFilterProjeto('');setFilterCliente('');setFilterDateStart('');setFilterDateEnd('');}}
            className="text-xs text-slate-400 hover:text-red-500 border border-slate-200 hover:border-red-200 px-3 py-2 rounded-xl transition self-end">
            ✕ Limpar
          </button>
        )}
        <div className="ml-auto self-end text-xs text-slate-400 font-medium">{events.length} fase(s)</div>
      </div>

      {/* ── Overview (before calendar grid) ── */}
      <CalOverview events={events} today={today}/>

      {/* ── Divider + section label ── */}
      <div className="flex items-center gap-3 mb-5">
        <div className="h-px flex-1 bg-slate-200"/>
        <span className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Calendário</span>
        <div className="h-px flex-1 bg-slate-200"/>
      </div>

      {/* ── Nav bar ── */}
      <div className="flex items-center gap-3 mb-4">
        <button onClick={()=>setNavDate(calSoD(today))}
          className="text-sm border border-slate-200 px-4 py-2 rounded-xl hover:bg-slate-50 transition font-medium">Hoje</button>
        <button onClick={navPrev}
          className="text-sm border border-slate-200 px-3.5 py-2 rounded-xl hover:bg-slate-50 transition text-lg leading-none">‹</button>
        <button onClick={navNext}
          className="text-sm border border-slate-200 px-3.5 py-2 rounded-xl hover:bg-slate-50 transition text-lg leading-none">›</button>
        <span className="text-base font-bold text-slate-800 flex-1 ml-1">{navTitle}</span>
        <div className="flex bg-slate-100 rounded-xl p-1 gap-1">
          {['month','week','day'].map(v=>(
            <button key={v} onClick={()=>setViewMode(v)}
              className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition ${viewMode===v?'bg-white shadow text-emerald-600':'text-slate-500 hover:text-slate-700'}`}>
              {v==='month'?'Mês':v==='week'?'Semana':'Dia'}
            </button>
          ))}
        </div>
      </div>

      {/* ── Calendar body ── */}
      {viewMode==='month'&&<CalMonthView events={events} navDate={navDate} today={today} onDayClick={setSelectedDay}/>}
      {viewMode==='week'&&<CalWeekView  events={events} navDate={navDate} today={today} onDayClick={setSelectedDay}/>}
      {viewMode==='day'&&<CalDayView   events={events} navDate={navDate} today={today} onDayClick={d=>setNavDate(d)}/>}

      {/* ── Legend ── */}
      <div className="mt-6 flex flex-wrap gap-4 justify-center">
        {PHASES.map(ph=>(
          <div key={ph.key} className="flex items-center gap-2 text-xs text-slate-600">
            <div className="w-3 h-3 rounded-full shrink-0" style={{background:CAL_COLORS[ph.key]||'#64748b'}}/>
            {ph.label}
          </div>
        ))}
      </div>

      {/* ── Day detail modal ── */}
      {selectedDay&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={()=>setSelectedDay(null)}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm"/>
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[80vh] flex flex-col" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
              <div>
                <h3 className="font-bold text-slate-800 text-base">{calFmt(selectedDay)}</h3>
                <p className="text-xs text-slate-400 mt-0.5">{CAL_DAY_NAMES[selectedDay.getDay()]}</p>
              </div>
              <button onClick={()=>setSelectedDay(null)} className="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
            </div>
            <div className="overflow-y-auto px-5 py-4 space-y-3">
              {dayModalEvents.length===0&&(
                <p className="text-sm text-slate-400 text-center py-8">Nenhuma fase ativa neste dia.</p>
              )}
              {dayModalEvents.map(e=>(
                <div key={e.id} className="rounded-xl p-4 bg-slate-50 border-l-4" style={{borderLeftColor:e.color}}>
                  <div className="text-xs font-semibold mb-1" style={{color:e.color}}>{e.phaseLabel}</div>
                  <div className="text-sm font-semibold text-slate-800">{e.projTitle}</div>
                  <div className="text-xs text-slate-500 mt-0.5">{e.client}{e.ciclo?` · ${e.ciclo}`:''}</div>
                  <div className="text-xs text-slate-400 mt-2">{calFmt(e.start)} → {calFmt(e.end)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Month View ──
function CalMonthView({ events, navDate, today, onDayClick }) {
  const yr=navDate.getFullYear(), mo=navDate.getMonth();
  const grid=calGetMonthGrid(yr,mo);
  const weeks=Array.from({length:6},(_,i)=>grid.slice(i*7,i*7+7));
  return (
    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <div className="grid grid-cols-7 border-b border-slate-100 bg-slate-50">
        {CAL_DAY_NAMES.map(d=>(
          <div key={d} className="py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider">{d}</div>
        ))}
      </div>
      {weeks.map((week,wi)=>(
        <CalMonthWeekRow key={wi} week={week} events={events} month={mo} today={today} onDayClick={onDayClick}/>
      ))}
    </div>
  );
}

function CalMonthWeekRow({ week, events, month, today, onDayClick }) {
  const weekStart=week[0], weekEnd=week[6];

  const weekEvents=events
    .filter(e=>e.start<=weekEnd&&e.end>=weekStart)
    .sort((a,b)=>a.start-b.start||(b.end-b.start)-(a.end-a.start));

  const tracks=[];
  const eventTracks=new Map();
  weekEvents.forEach(evt=>{
    let placed=false;
    for (let t=0;t<tracks.length;t++) {
      const last=tracks[t][tracks[t].length-1];
      if (last.end<evt.start) { tracks[t].push(evt); eventTracks.set(evt.id,t); placed=true; break; }
    }
    if (!placed) { tracks.push([evt]); eventTracks.set(evt.id,tracks.length-1); }
  });

  const numTracks=tracks.length;
  const rowH=Math.max(90, 38+numTracks*26);

  return (
    <div className="relative border-b border-slate-100 last:border-b-0" style={{height:rowH}}>
      {/* Day cells */}
      <div className="absolute inset-0 grid grid-cols-7">
        {week.map((day,di)=>{
          const isToday=calSameDay(day,today);
          const isCurMo=day.getMonth()===month;
          return (
            <div key={di} onClick={()=>onDayClick(calSoD(day))}
              className={`border-r border-slate-100 last:border-r-0 cursor-pointer hover:bg-emerald-50/70 transition-colors ${!isCurMo?'bg-slate-50/60':''}`}>
              <div className={`text-xs w-7 h-7 flex items-center justify-center rounded-full font-semibold mx-auto mt-2
                ${isToday?'bg-emerald-500 text-white':isCurMo?'text-slate-700':'text-slate-300'}`}>
                {day.getDate()}
              </div>
            </div>
          );
        })}
      </div>
      {/* Event bars */}
      {weekEvents.map(evt=>{
        const track=eventTracks.get(evt.id);
        const cs=evt.start<weekStart?weekStart:evt.start;
        const ce=evt.end>weekEnd?weekEnd:evt.end;
        const sd=Math.round((cs-weekStart)/864e5);
        const ed=Math.round((ce-weekStart)/864e5);
        const leftPct=(sd/7)*100;
        const widthPct=((ed-sd+1)/7)*100;
        const continuesLeft=evt.start<weekStart;
        const continuesRight=evt.end>weekEnd;
        return (
          <div key={evt.id}
            onClick={e=>{e.stopPropagation();onDayClick(calSoD(cs));}}
            title={`${evt.projTitle} · ${evt.phaseLabel}\n${calFmt(evt.start)} → ${calFmt(evt.end)}`}
            style={{
              position:'absolute',
              left:`calc(${leftPct}% + ${continuesLeft?0:3}px)`,
              width:`calc(${widthPct}% - ${(continuesLeft?0:3)+(continuesRight?0:3)}px)`,
              top:`${36+track*26}px`,
              height:'20px',
              background:evt.color,
              borderRadius:`${continuesLeft?0:5}px ${continuesRight?0:5}px ${continuesRight?0:5}px ${continuesLeft?0:5}px`,
              display:'flex',alignItems:'center',
              paddingLeft:continuesLeft?5:7,
              overflow:'hidden',opacity:0.88,cursor:'pointer',zIndex:2,
              boxShadow:'0 1px 3px rgba(0,0,0,0.15)',
              borderLeft:continuesLeft?`2px dashed rgba(255,255,255,0.6)`:'none',
            }}>
            <span style={{fontSize:'10px',color:'white',fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:1,letterSpacing:'0.01em'}}>
              {continuesLeft&&'↩ '}{evt.projTitle} – {evt.phaseLabel}
            </span>
          </div>
        );
      })}
    </div>
  );
}

// ── Week View ──
function CalWeekView({ events, navDate, today, onDayClick }) {
  const weekDays=calGetWeekDays(navDate);
  const weekStart=weekDays[0], weekEnd=weekDays[6];

  const weekEvents=events
    .filter(e=>e.start<=weekEnd&&e.end>=weekStart)
    .sort((a,b)=>a.start-b.start||(b.end-b.start)-(a.end-a.start));

  const tracks=[];
  const eventTracks=new Map();
  weekEvents.forEach(evt=>{
    let placed=false;
    for (let t=0;t<tracks.length;t++) {
      const last=tracks[t][tracks[t].length-1];
      if (last.end<evt.start) { tracks[t].push(evt); eventTracks.set(evt.id,t); placed=true; break; }
    }
    if (!placed) { tracks.push([evt]); eventTracks.set(evt.id,tracks.length-1); }
  });

  const numTracks=Math.max(tracks.length,1);
  const bodyH=Math.max(120, numTracks*36+24);

  return (
    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      {/* Day headers */}
      <div className="grid grid-cols-7 border-b border-slate-100 bg-slate-50">
        {weekDays.map((day,i)=>{
          const isToday=calSameDay(day,today);
          return (
            <div key={i} onClick={()=>onDayClick(calSoD(day))}
              className={`py-3 text-center cursor-pointer hover:bg-emerald-50 border-r border-slate-100 last:border-r-0 transition-colors ${isToday?'bg-emerald-50/80':''}`}>
              <div className="text-xs text-slate-500 uppercase font-semibold tracking-wide">{CAL_DAY_NAMES[day.getDay()]}</div>
              <div className={`text-sm font-bold mx-auto mt-1 w-8 h-8 flex items-center justify-center rounded-full ${isToday?'bg-emerald-500 text-white':'text-slate-800'}`}>
                {day.getDate()}
              </div>
            </div>
          );
        })}
      </div>
      {/* Events area */}
      <div className="relative" style={{height:bodyH}}>
        {weekEvents.length===0&&(
          <p className="text-center text-sm text-slate-400 py-10">Nenhuma fase nesta semana.</p>
        )}
        {weekEvents.map(evt=>{
          const track=eventTracks.get(evt.id);
          const cs=evt.start<weekStart?weekStart:evt.start;
          const ce=evt.end>weekEnd?weekEnd:evt.end;
          const sd=Math.round((cs-weekStart)/864e5);
          const ed=Math.round((ce-weekStart)/864e5);
          const leftPct=(sd/7)*100;
          const widthPct=((ed-sd+1)/7)*100;
          const contL=evt.start<weekStart, contR=evt.end>weekEnd;
          return (
            <div key={evt.id}
              onClick={()=>onDayClick(calSoD(cs))}
              title={`${evt.projTitle} · ${evt.phaseLabel}\n${calFmt(evt.start)} → ${calFmt(evt.end)}`}
              style={{
                position:'absolute',
                left:`calc(${leftPct}% + ${contL?0:5}px)`,
                width:`calc(${widthPct}% - ${(contL?0:5)+(contR?0:5)}px)`,
                top:`${10+track*36}px`,
                height:'26px',
                background:evt.color,
                borderRadius:`${contL?0:7}px ${contR?0:7}px ${contR?0:7}px ${contL?0:7}px`,
                display:'flex',alignItems:'center',paddingLeft:contL?5:10,
                overflow:'hidden',cursor:'pointer',zIndex:1,
                boxShadow:'0 1px 3px rgba(0,0,0,0.12)',
                borderLeft:contL?`2px dashed rgba(255,255,255,0.6)`:'none',
              }}>
              <span style={{fontSize:'11px',color:'white',fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',letterSpacing:'0.01em'}}>
                {contL&&'↩ '}{evt.projTitle} – {evt.phaseLabel}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Day View ──
function CalDayView({ events, navDate, today }) {
  const dayEvents=events.filter(e=>e.start<=navDate&&e.end>=navDate).sort((a,b)=>a.start-b.start);
  const isToday=calSameDay(navDate,today);

  return (
    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <div className={`px-6 py-5 border-b border-slate-100 ${isToday?'bg-emerald-50/60':''}`}>
        <div className="text-xl font-bold text-slate-900">
          {CAL_DAY_NAMES[navDate.getDay()]}, {String(navDate.getDate()).padStart(2,'0')} de {CAL_MONTH_NAMES[navDate.getMonth()]} de {navDate.getFullYear()}
          {isToday&&<span className="ml-3 text-xs bg-emerald-500 text-white px-2.5 py-1 rounded-full font-semibold">Hoje</span>}
        </div>
        <div className="text-xs text-slate-400 mt-1.5 font-medium">{dayEvents.length} fase(s) ativa(s)</div>
      </div>
      <div className="px-6 py-5">
        {dayEvents.length===0?(
          <div className="text-center text-sm text-slate-400 py-12">Nenhuma fase ativa neste dia.</div>
        ):(
          <div className="space-y-4">
            {dayEvents.map(evt=>{
              const st = CAL_STATUS[calPhaseStatus(evt.start, evt.end, today)];
              const daysLeft = Math.round((evt.end - today) / 864e5);
              return (
                <div key={evt.id} className="rounded-2xl bg-slate-50 border border-slate-100 overflow-hidden"
                  style={{borderLeftWidth:'5px',borderLeftColor:evt.color,borderLeftStyle:'solid'}}>
                  <div className="px-5 py-4">
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <div className="flex flex-wrap items-center gap-2 mb-2">
                          <span className="text-xs font-bold px-2.5 py-1 rounded-full text-white" style={{background:evt.color}}>
                            {evt.phaseLabel}
                          </span>
                          <span className="text-xs font-semibold" style={{color:st.color}}>
                            {st.emoji} {st.label}
                          </span>
                        </div>
                        <div className="text-base font-bold text-slate-900">{evt.projTitle}</div>
                        <div className="text-sm text-slate-500 mt-1">{evt.client}{evt.ciclo?` · ${evt.ciclo}`:''}</div>
                      </div>
                      <div className="text-right shrink-0">
                        <div className="text-xs text-slate-400 font-medium">
                          {calFmt(evt.start)}
                        </div>
                        <div className="text-xs text-slate-300 my-0.5">↓</div>
                        <div className="text-xs text-slate-400 font-medium">
                          {calFmt(evt.end)}
                        </div>
                        <div className="text-xs font-semibold mt-1.5" style={{color:st.color}}>
                          {daysLeft < 0 ? `${Math.abs(daysLeft)}d atrasado` : daysLeft===0 ? 'Último dia' : `${daysLeft}d restantes`}
                        </div>
                      </div>
                    </div>
                    <div className="text-xs text-slate-400 mt-2 font-medium">
                      Duração total: {Math.round((evt.end-evt.start)/864e5)+1} dias
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
