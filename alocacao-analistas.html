// ─── Date Helpers (always LOCAL midnight — never UTC) ──────────────────────────
function parseSPDate(v) {
  if (!v) return null;
  const s = String(v).trim();
  if (!s) return null;
  if (s.includes('T')) {
    const [y,m,d] = s.split('T')[0].split('-').map(Number);
    return new Date(y, m-1, d);
  }
  if (s.includes('/')) {
    const [d,m,y] = s.split(' ')[0].split('/').map(Number);
    if (y&&m&&d) return new Date(y, m-1, d);
  }
  if (s.includes('-')) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  return null;
}
function fmtDateForInput(raw) {          // → YYYY-MM-DD for <input type="date">
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateForSP(raw) {             // → "YYYY-MM-DDTHH:mm:ssZ" (avoids UTC shift)
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T00:00:00Z`;
}
function fmtDateDisplay(raw) {
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return '—';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function monthKey(date) {
  const d = typeof date==='string' ? parseSPDate(date) : date;
  if (!d||isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(mk) {
  if (!mk) return '';
  const [y,m] = mk.split('-');
  return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m)-1]+'/'+y;
}
function rangeMonths(start, end) {
  if (!start||!end) return [];
  const [sy,sm] = start.split('-').map(Number);
  const [ey,em] = end.split('-').map(Number);
  if (!sy||!sm||!ey||!em) return [];
  const s = new Date(sy, sm-1, 1);
  const e = new Date(ey, em-1, 1);
  const out = []; let cur = new Date(s);
  while (cur<=e && out.length<36) {
    out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`);
    cur.setMonth(cur.getMonth()+1);
  }
  return out;
}
function daysOverlapInMonth(startRaw, endRaw, mk) {
  if (!startRaw||!endRaw||!mk) return 0;
  const [y,m] = mk.split('-').map(Number);
  const mS = new Date(y,m-1,1), mE = new Date(y,m,0);
  const phS = parseSPDate(startRaw), phE = parseSPDate(endRaw);
  if (!phS||!phE) return 0;
  const oS = phS>mS?phS:mS, oE = phE<mE?phE:mE;
  return Math.max(0, Math.round((oE-oS)/(864e5))+1);
}

// ─── PCT Helpers ──────────────────────────────────────────────────────────────
function parsePct(v) {
  if (!v&&v!==0) return 0;
  const s = String(v).trim();
  if (!s||s==='0') return 0;
  if (s.includes('%')) return parseFloat(s.replace('%','').replace(',','.')) || 0;
  return (parseFloat(s.replace(',','.')) || 0) * 100;
}
function pctToSP(pct) { return pct/100; }
function totalPhasePct(phase) { return (phase?.pcts||[]).reduce((a,b)=>a+(b||0), 0); }

// ─── Parse SharePoint Item → internal model ───────────────────────────────────
// phases[key].pcts = number[] (one per analyst, same order as analysts[])
function parseSPItem(item) {
  const analysts = ANALYST_KEYS
    .map(k=>(item[k]||'').trim())
    .filter(a=>a&&a!==PLACEHOLDER);
  const n = Math.max(analysts.length, 1);
  const phases = {};
  PHASES.forEach(ph=>{
    const tot      = parsePct(item[`Analista_${ph.key}_PCT`]);
    const perEach  = tot>0 ? Math.round(tot/n) : 0;
    phases[ph.key] = {
      start: item[`Inicio_${ph.key}`]||null,
      end:   item[`Fim_${ph.key}`]||null,
      pcts:  analysts.map(()=>perEach),   // equal split — user can adjust
    };
  });
  // Populate pulseData from PULSE_FIELDS — date fields converted to input format
  const pulseData = {};
  PULSE_FIELDS.forEach(f => {
    const raw = item[f.k];
    pulseData[f.k] = (f.t==='date') ? (fmtDateForInput(raw)||'') : (raw!==undefined&&raw!==null ? String(raw) : '');
  });
  return {
    id:       String(item.Id||item.indice||'r'+Math.random()),
    spId:     item.Id||item.id||null,
    indice:   Number(item.indice)||0,
    title:    item.Nome_Programa||item.Title||'Sem título',
    client:   item.Cliente||'',
    status:   item.Status_Programa||'',
    ciclo:    item.Ciclo_Orcamentario||'',
    ka:       item.KA||'',
    head1:    item.Head_1||'',
    head2:    item.Head_2||'',
    head3:    item.Head_3||'',
    source:   'sharepoint',
    analysts,
    phases,
    pulseData,
  };
}

// ─── Build SP PATCH/POST payload from internal project ────────────────────────
function buildSPPayload(project) {
  const payload = {};
  if (project.ciclo  !== undefined) payload['Ciclo_Orcamentario'] = project.ciclo||null;
  if (project.ka     !== undefined) payload['KA']     = project.ka||null;
  if (project.head1  !== undefined) payload['Head_1'] = project.head1||null;
  if (project.head2  !== undefined) payload['Head_2'] = project.head2||null;
  if (project.head3  !== undefined) payload['Head_3'] = project.head3||null;
  for (let i=0; i<MAX_ANALYSTS; i++) {
    payload[`Analista_${i+1}`] = project.analysts[i]||null;
  }
  PHASES.forEach(ph=>{
    const phase = project.phases[ph.key]||{};
    const total = totalPhasePct(phase);
    payload[`Inicio_${ph.key}`]       = phase.start ? fmtDateForSP(phase.start) : null;
    payload[`Fim_${ph.key}`]          = phase.end   ? fmtDateForSP(phase.end)   : null;
    payload[`Analista_${ph.key}_PCT`] = pctToSP(total);   // sum of all analyst pcts → decimal
  });
  return payload;
}

// ─── Compute Allocations (day-weighted, per-analyst pct) ──────────────────────
function computeAllocations(projects) {
  const result = {};
  projects.forEach(proj=>{
    proj.analysts.forEach((analyst, idx)=>{
      if (!analyst) return;
      if (!result[analyst]) result[analyst]={};
      PHASES.forEach(ph=>{
        const phase = proj.phases[ph.key];
        const pct   = phase?.pcts?.[idx]||0;
        if (!phase?.start||!phase?.end||!pct) return;
        const sMk = monthKey(parseSPDate(phase.start));
        const eMk = monthKey(parseSPDate(phase.end));
        if (!sMk||!eMk) return;
        rangeMonths(sMk,eMk).forEach(mk=>{
          const [y,m] = mk.split('-').map(Number);
          const dim   = new Date(y,m,0).getDate();
          const ov    = daysOverlapInMonth(phase.start,phase.end,mk);
          result[analyst][mk] = (result[analyst][mk]||0) + pct*(ov/dim);
        });
      });
    });
  });
  Object.values(result).forEach(a=>Object.keys(a).forEach(mk=>{a[mk]=Math.round(a[mk]);}));
  return result;
}

let _msalApp = null;
function getMsalApp(clientId, tenantId) {
  if (_msalApp) return _msalApp;
  if (!window.msal) throw new Error('Biblioteca MSAL não carregou. Verifique sua conexão com a internet e recarregue a página. O arquivo deve ser acessado via http:// (não file://).');
  _msalApp = new msal.PublicClientApplication({
    auth: {
      clientId,
      authority:`https://login.microsoftonline.com/${tenantId||'common'}`,
      redirectUri: window.location.origin+window.location.pathname,
    },
    cache:{ cacheLocation:'sessionStorage', storeAuthStateInCookie:false },
  });
  return _msalApp;
}
async function acquireToken(clientId, tenantId) {
  const app = getMsalApp(clientId, tenantId);
  await app.initialize();
  const accounts = app.getAllAccounts();
  if (accounts.length===0) {
    const res = await app.loginPopup({scopes:[SP_SCOPE]});
    return {token:res.accessToken, user:res.account?.name||res.account?.username||'Usuário'};
  }
  try {
    const res = await app.acquireTokenSilent({scopes:[SP_SCOPE], account:accounts[0]});
    return {token:res.accessToken, user:accounts[0]?.name||accounts[0]?.username||'Usuário'};
  } catch {
    const res = await app.loginPopup({scopes:[SP_SCOPE]});
    return {token:res.accessToken, user:res.account?.name||res.account?.username||'Usuário'};
  }
}
async function signOutMsal(clientId, tenantId) {
  try {
    const app = getMsalApp(clientId, tenantId);
    await app.initialize();
    const account = app.getAllAccounts()[0];
    if (account) await app.logoutPopup({account});
  } catch {}
  sessionStorage.clear();
  _msalApp = null;
}

// ─── Moskit CSV helpers ───────────────────────────────────────────────────────
const MOSKIT_SP_SCOPE  = 'https://ciadetalentos.sharepoint.com/.default';
const MOSKIT_SITE_URL  = 'https://ciadetalentos.sharepoint.com/sites/Public';
const MOSKIT_FILE_REL  = "/sites/Public/Documentos Partilhados/Desenvolvimento de Neg\u00f3cios/0 Back Office - DN/Relat\u00f3rio de Vendas/Base_Moskit.csv";
const MOSKIT_COLS = [
  {key:'ID',                          label:'ID',              fk:'id',      type:'text'},
  {key:'Nome',                        label:'Nome',            fk:'nome',    type:'text'},
  {key:'Produto Principal',           label:'Produto',         fk:'produto', type:'select'},
  {key:'Status',                      label:'Status',          fk:'status',  type:'select'},
  {key:'Probabilidade de Fechamento', label:'Prob. Fechamento',fk:'prob',    type:'select'},
  {key:'Frente de Neg\u00f3cio',      label:'Frente de Neg.',  fk:'frente',  type:'select'},
  {key:'Ciclo Or\u00e7ament\u00e1rio',label:'Ciclo Orç.',      fk:'ciclo',   type:'select'},
];
async function acquireTokenForResource(clientId, tenantId, scope) {
  const app = getMsalApp(clientId, tenantId);
  await app.initialize();
  const accounts = app.getAllAccounts();
  if (!accounts.length) throw new Error('Não autenticado');
  try {
    const res = await app.acquireTokenSilent({scopes:[scope], account:accounts[0]});
    return res.accessToken;
  } catch {
    const res = await app.loginPopup({scopes:[scope]});
    return res.accessToken;
  }
}
async function fetchMoskitCSV(clientId, tenantId) {
  const token = await acquireTokenForResource(clientId, tenantId, MOSKIT_SP_SCOPE);
  const safeRel = MOSKIT_FILE_REL.replace(/'/g,"''");
  const url = `${MOSKIT_SITE_URL}/_api/web/GetFileByServerRelativeUrl('${safeRel}')/$value`;
  const res = await fetch(url, {headers:{'Authorization':`Bearer ${token}`}});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buffer = await res.arrayBuffer();
  // Try UTF-8 first; if garbled characters detected, fall back to Windows-1252
  const utf8 = new TextDecoder('utf-8').decode(buffer);
  if (utf8.includes('\uFFFD')) return new TextDecoder('windows-1252').decode(buffer);
  return utf8;
}

// ─── SharePoint REST ──────────────────────────────────────────────────────────
async function spFetch(token, url, opts={}) {
  const res = await fetch(url, {
    ...opts,
    headers:{
      'Authorization':`Bearer ${token}`,
      'Accept':'application/json;odata=nometadata',
      ...(opts.headers||{}),
    },
  });
  if (!res.ok) { const t=await res.text().catch(()=>''); throw new Error(`SP ${res.status}: ${t.slice(0,200)}`); }
  if (res.status===204) return null;
  return res.json();
}
function _spListBase(siteUrl, listName) {
  // Use GetList with server-relative URL — more reliable than GetByTitle
  const rel = new URL(siteUrl).pathname.replace(/\/$/, '');
  return `${siteUrl}/_api/web/GetList('${rel}/Lists/${listName}')`;
}
async function fetchSPList(token, siteUrl, listName) {
  // Sem $select — evita limite de tamanho de URL com muitos campos customizados.
  // O SP retorna todos os campos do item; parseSPItem lida com campos ausentes.
  const base = _spListBase(siteUrl, listName);
  let items=[], url=`${base}/items?$top=200`;
  while (url) {
    const json = await spFetch(token, url);
    items = items.concat(json.value||[]);
    url = json['@odata.nextLink']||null;
  }
  return items;
}
async function fetchTeamMembers(token, siteUrl) {
  try {
    const base = _spListBase(siteUrl, SP_TEAM_LIST);
    const url  = `${base}/items?$select=Title,Classificacao&$filter=Classificacao eq 'Analista'&$top=500`;
    const json = await spFetch(token, url);
    return (json.value||[]).map(i=>( i.Title||'' ).trim()).filter(Boolean).sort();
  } catch { return []; }
}
async function patchSPItem(token, siteUrl, listName, spId, payload) {
  await spFetch(token, `${_spListBase(siteUrl,listName)}/items(${spId})`, {
    method:'POST',
    headers:{'Content-Type':'application/json;odata=nometadata','X-HTTP-Method':'MERGE','If-Match':'*'},
    body:JSON.stringify(payload),
  });
}
async function createSPItem(token, siteUrl, listName, payload) {
  const res = await fetch(`${_spListBase(siteUrl,listName)}/items`, {
    method:'POST',
    headers:{
      'Authorization':`Bearer ${token}`,
      'Accept':'application/json;odata=nometadata',
      'Content-Type':'application/json;odata=nometadata',
    },
    body:JSON.stringify(payload),
  });
  if (!res.ok) { const t=await res.text().catch(()=>''); throw new Error(`SP Create ${res.status}: ${t.slice(0,200)}`); }
  return res.json();
}

// ─── Dist data stored as attachment on a hidden List_Pulse item ───────────────
// Item Title='__alocacao_dist__' acts as a container; JSON stored as attachment.
// No field-length limits, no new columns, no Documents folder needed.
const DIST_MARKER   = '__alocacao_dist__';
const DIST_ATT_NAME = 'dist.json';
async function _getOrCreateDistItem(token, siteUrl) {
  const base   = _spListBase(siteUrl, SP_LIST_NAME);
  const chkUrl = `${base}/items?$select=Id&$filter=Title eq '${DIST_MARKER}'&$top=1`;
  const chkRes = await fetch(chkUrl, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'} });
  if (!chkRes.ok) throw new Error(`Erro ao buscar dist item: ${chkRes.status}`);
  const existing = ((await chkRes.json()).value||[])[0];
  if (existing) return existing.Id;
  // Create marker item
  const postRes = await fetch(`${base}/items`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata','Content-Type':'application/json;odata=nometadata'},
    body: JSON.stringify({ Title: DIST_MARKER }),
  });
  if (!postRes.ok) { const t=await postRes.text().catch(()=>''); throw new Error(`Erro ao criar dist item: ${postRes.status} ${t.slice(0,100)}`); }
  return (await postRes.json()).Id;
}
async function fetchDistFile(token, siteUrl) {
  try {
    const base   = _spListBase(siteUrl, SP_LIST_NAME);
    const chkUrl = `${base}/items?$select=Id&$filter=Title eq '${DIST_MARKER}'&$top=1`;
    const chkRes = await fetch(chkUrl, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'} });
    if (!chkRes.ok) return {distributions:{},localProjects:[]};
    const item = ((await chkRes.json()).value||[])[0];
    if (!item) return {distributions:{},localProjects:[]};
    const attRes = await fetch(`${base}/items(${item.Id})/AttachmentFiles('${DIST_ATT_NAME}')/$value`, {
      headers:{'Authorization':`Bearer ${token}`,'Accept':'text/plain'},
    });
    if (!attRes.ok) return {distributions:{},localProjects:[]};
    return JSON.parse(await attRes.text());
  } catch { return {distributions:{},localProjects:[]}; }
}
async function saveDistFile(token, siteUrl, data) {
  const base   = _spListBase(siteUrl, SP_LIST_NAME);
  const itemId = await _getOrCreateDistItem(token, siteUrl);
  const body   = new TextEncoder().encode(JSON.stringify(data));
  // Delete existing attachment first (ignore errors — might not exist yet)
  await fetch(`${base}/items(${itemId})/AttachmentFiles('${DIST_ATT_NAME}')`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'X-HTTP-Method':'DELETE','If-Match':'*'},
  }).catch(()=>{});
  // Upload new attachment
  const upRes = await fetch(`${base}/items(${itemId})/AttachmentFiles/add(FileName='${DIST_ATT_NAME}')`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/octet-stream'},
    body,
  });
  if (!upRes.ok) { const t=await upRes.text().catch(()=>''); throw new Error(`Erro ao salvar dist: ${upRes.status} ${t.slice(0,150)}`); }
}
// Merge SP items + distribution file → complete project list
function mergeProjectsWithDist(spItems, dist) {
  const spProjects = spItems
    .filter(item=>item.Title!==DIST_MARKER) // exclude hidden dist item
    .map(item=>{
    const proj = parseSPItem(item);
    const saved = dist.distributions?.[String(proj.spId)];
    if (!saved) return proj;
    const phases={};
    PHASES.forEach(ph=>{
      const storedPcts = saved[ph.key];
      const base = proj.phases[ph.key];
      // Use stored pcts if length matches analyst count, otherwise equal-split fallback
      phases[ph.key] = {
        ...base,
        pcts: storedPcts && storedPcts.length===proj.analysts.length ? storedPcts : base.pcts,
      };
    });
    return {...proj, phases};
  });
  return [...spProjects, ...(dist.localProjects||[])];
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const local = loadLocal();
  const [projects,   setProjects]   = useState([]);
  const [authState,  setAuthState]  = useState({isAuth:false,user:'',token:''});
  const [clientId,   setClientId]   = useState(APP_CONFIG.clientId||local.clientId||'');
  const [tenantId,   setTenantId]   = useState(APP_CONFIG.tenantId||local.tenantId||'common');
  const [loading,    setLoading]    = useState(false);
  const [saving,     setSaving]     = useState(false);
  const [error,      setError]      = useState('');
  const [saveMsg,    setSaveMsg]    = useState(null);
  const [view,       setView]       = useState('dashboard');
  const [monthRange, setMonthRange] = useState(()=>{
    const n=new Date();
    const s=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
    const e=new Date(n.getFullYear()+1,n.getMonth(),1);
    return {start:s, end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};
  });
  const [distData,         setDistData]         = useState({distributions:{},localProjects:[]});
  const [teamMembers,      setTeamMembers]      = useState([]);
  const [cicloFilter,      setCicloFilter]      = useState('');
  const [showEdit,         setShowEdit]         = useState(null);   // project obj or 'new'
  const [showAnalystDetail,setShowAnalystDetail] = useState(null);
  const [module,           setModule]           = useState(null);   // null=home | 'gestao' | 'pulse'

  // Only persist config locally when it wasn't baked into APP_CONFIG
  useEffect(()=>{ if (!APP_CONFIG.clientId) saveLocal({clientId,tenantId}); },[clientId,tenantId]);

  const ciclos          = useMemo(()=>[...new Set(projects.map(p=>p.ciclo).filter(Boolean))].sort(),[projects]);
  const filteredProjects= useMemo(()=>cicloFilter ? projects.filter(p=>p.ciclo===cicloFilter) : projects,[projects,cicloFilter]);
  const allocations     = useMemo(()=>computeAllocations(filteredProjects),[filteredProjects]);
  // Always show all team analysts; fall back to allocation-derived list if team not loaded
  const analysts        = useMemo(()=>{
    if (teamMembers.length>0) return teamMembers;
    return Object.keys(allocations).sort();
  },[teamMembers, allocations]);
  const months          = useMemo(()=>rangeMonths(monthRange.start,monthRange.end),[monthRange]);

  // ── Load all data: SP items + dist file → merged projects ──
  const loadAll = useCallback(async(token)=>{
    setLoading(true); setError('');
    try {
      const [spItems, dist, team] = await Promise.all([
        fetchSPList(token, SP_SITE_URL, SP_LIST_NAME),
        fetchDistFile(token, SP_SITE_URL),
        fetchTeamMembers(token, SP_SITE_URL),
      ]);
      setDistData(dist);
      setTeamMembers(team);
      setProjects(mergeProjectsWithDist(spItems, dist));
    } catch(e) {
      // Diagnostic: try to list all visible lists to find correct name
      let diagMsg = 'Erro ao carregar dados: '+e.message;
      try {
        const diagUrl = `${SP_SITE_URL}/_api/web/lists?$select=Title,Hidden,RootFolder/ServerRelativeUrl&$expand=RootFolder&$top=100`;
        const diagRes = await fetch(diagUrl, {headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'}});
        if (diagRes.ok) {
          const diagJson = await diagRes.json();
          const names = (diagJson.value||[]).map(l=>`"${l.Title}"${l.Hidden?'[oculta]':''} (${l.RootFolder?.ServerRelativeUrl||''})`).join(' | ');
          diagMsg += `\n\n📋 Listas encontradas no site:\n${names||'(nenhuma)'}`;
        } else {
          diagMsg += `\n\n⚠️ Sem acesso ao site (${diagRes.status}). Verifique permissões do app no Azure AD (AllSites.Read).`;
        }
      } catch(diagE) { diagMsg += '\n\n⚠️ Diagnóstico falhou: '+diagE.message; }
      setError(diagMsg);
    }
    finally { setLoading(false); }
  },[]);

  const signInAndFetch = useCallback(async()=>{
    if (!clientId) { setError('⚙️ Client ID não configurado. Edite APP_CONFIG no início do arquivo.'); return; }
    setLoading(true); setError('');
    try {
      const {token,user} = await acquireToken(clientId,tenantId);
      setAuthState({isAuth:true,user,token});
      await loadAll(token);
    } catch(e) { setError('Erro: '+e.message); }
    finally { setLoading(false); }
  },[clientId,tenantId,loadAll]);

  const signOut = useCallback(async()=>{
    await signOutMsal(clientId,tenantId);
    setAuthState({isAuth:false,user:'',token:''});
    setProjects([]);
    setDistData({distributions:{},localProjects:[]});
  },[clientId,tenantId]);

  // ── Save Project ──
  // SP projects:    PATCH/POST List_Pulse  +  update distributions in dist file
  // Local projects: save full project obj in dist file (shared via SP, no new SP columns)
  const saveProject = useCallback(async(project)=>{
    if (!authState.isAuth || !authState.token) {
      // No auth: session-only (warn user)
      if (project.spId) {
        setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
      } else {
        setProjects(prev=>[...prev, {...project, id:'local_'+Date.now(), source:'local'}]);
      }
      setSaveMsg({type:'warn',text:'⚠️ Salvo localmente nesta sessão. Conecte ao SharePoint para compartilhar.'});
      setShowEdit(null);
      setTimeout(()=>setSaveMsg(null),7000);
      return;
    }

    setSaving(true); setSaveMsg(null);
    try {
      // Work on a mutable copy of distData
      const newDist = {
        distributions: {...(distData.distributions||{})},
        localProjects:  [...(distData.localProjects||[])],
      };

      if (project.source==='sharepoint') {
        // ── SP project ──
        const payload = buildSPPayload(project);
        if (project.spId) {
          await patchSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, project.spId, payload);
          setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
        } else {
          const maxIndice = projects
            .filter(p=>p.source==='sharepoint')
            .map(p=>Number(p.indice)||0)
            .reduce((a,b)=>Math.max(a,b), 0);
          const fullPayload = {
            ...payload,
            Title:project.title, Nome_Programa:project.title,
            Cliente:project.client||'', Status_Programa:project.status||'',
            indice: maxIndice + 1,
          };
          const created = await createSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, fullPayload);
          const newId   = created.Id||created.id;
          const saved   = {...project, spId:newId, id:String(newId), source:'sharepoint'};
          setProjects(prev=>[...prev, saved]);
          project = saved; // update reference for dist save below
        }
        // Save per-analyst distribution for this SP project
        const dist={};
        PHASES.forEach(ph=>{ dist[ph.key]=project.phases[ph.key]?.pcts||[]; });
        newDist.distributions[String(project.spId)] = dist;
        setSaveMsg({type:'success', text:'✓ Salvo no SharePoint.'});

      } else {
        // ── Local / tool-only project → stored entirely in dist file ──
        const finalId = project.id?.startsWith('proj_')||project.id?.startsWith('local_')
          ? project.id : 'local_'+Date.now();
        const localProj = {...project, id:finalId, spId:null, source:'local'};
        const idx = newDist.localProjects.findIndex(p=>p.id===localProj.id);
        if (idx>=0) {
          newDist.localProjects[idx] = localProj;
          setProjects(prev=>prev.map(p=>p.id===localProj.id ? localProj : p));
        } else {
          newDist.localProjects.push(localProj);
          setProjects(prev=>[...prev, localProj]);
        }
        setSaveMsg({type:'success', text:'✓ Projeto salvo na ferramenta (visível para todos).'});
      }

      // Write updated dist file to SharePoint
      await saveDistFile(authState.token, SP_SITE_URL, newDist);
      setDistData(newDist);

    } catch(e) {
      setSaveMsg({type:'error', text:'Erro ao salvar: '+e.message});
    } finally {
      setSaving(false);
      setShowEdit(null);
      setTimeout(()=>setSaveMsg(null),5000);
    }
  },[authState, distData]);

  // ── Save Pulse (full-field PATCH from PulseView) ──
  const savePulse = useCallback(async(project)=>{
    if (!authState.isAuth || !project.spId) return;
    setSaving(true); setSaveMsg(null);
    try {
      const payload = {
        Nome_Programa:      project.title||null,
        Cliente:            project.client||null,
        Status_Programa:    project.status||null,
        Ciclo_Orcamentario: project.ciclo||null,
        KA:                 project.ka||null,
        Head_1:             project.head1||null,
        Head_2:             project.head2||null,
        Head_3:             project.head3||null,
      };
      // Pulse extra fields — date fields converted back to SP ISO format
      if (project.pulseData) {
        PULSE_FIELDS.forEach(f=>{
          const v = project.pulseData[f.k];
          payload[f.k] = (f.t==='date') ? (v ? fmtDateForSP(v) : null) : (v||null);
        });
      }
      for (let i=0; i<MAX_ANALYSTS; i++) {
        payload[`Analista_${i+1}`] = project.analysts[i]||null;
      }
      PHASES.forEach(ph=>{
        const phase = project.phases[ph.key]||{};
        const total = totalPhasePct(phase);
        payload[`Inicio_${ph.key}`]       = phase.start ? fmtDateForSP(phase.start) : null;
        payload[`Fim_${ph.key}`]          = phase.end   ? fmtDateForSP(phase.end)   : null;
        payload[`Analista_${ph.key}_PCT`] = pctToSP(total);
      });
      await patchSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, project.spId, payload);
      // Update per-analyst distributions in dist file
      const newDist = {
        distributions: {...(distData.distributions||{})},
        localProjects:  [...(distData.localProjects||[])],
      };
      const distEntry={};
      PHASES.forEach(ph=>{ distEntry[ph.key]=project.phases[ph.key]?.pcts||[]; });
      newDist.distributions[String(project.spId)] = distEntry;
      await saveDistFile(authState.token, SP_SITE_URL, newDist);
      setDistData(newDist);
      setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
      setSaveMsg({type:'success', text:'✓ Salvo no SharePoint.'});
    } catch(e) {
      setSaveMsg({type:'error', text:'Erro ao salvar: '+e.message});
    } finally {
      setSaving(false);
      setTimeout(()=>setSaveMsg(null), 5000);
    }
  },[authState, distData]);

  // ── Suggestions ──
  function getSuggestions(proj, phKey) {
    const ph = proj.phases[phKey];
    if (!ph?.start||!ph?.end) return [];
    const mths = rangeMonths(monthKey(parseSPDate(ph.start)),monthKey(parseSPDate(ph.end)));
    return analysts.filter(a=>!proj.analysts.includes(a))
      .map(a=>({analyst:a, maxAlloc:Math.max(0,...mths.map(m=>allocations[a]?.[m]||0))}))
      .map(s=>({...s, available:100-s.maxAlloc}))
      .filter(s=>s.available>0).sort((a,b)=>b.available-a.available).slice(0,5);
  }

  // ── CSV Import ──
  const importCSV = useCallback(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const text = e.target.result;
      const firstLine = text.split('\n')[0]||'';
      const delim = firstLine.split(';').length>firstLine.split(',').length?';':',';
      Papa.parse(text,{header:true,skipEmptyLines:true,delimiter:delim,
        complete:r=>{
          if (r.errors.length&&!r.data.length) { setError('Erro CSV: '+r.errors[0].message); return; }
          setProjects(r.data.map((row,i)=>parseSPItem({Id:row.Id||row.id||i+1,...row})));
          setError('');
        },
        error:e=>setError('Erro CSV: '+e.message),
      });
    };
    reader.readAsText(file,'UTF-8');
  },[]);

  // ── Not authenticated: show full-screen login ──
  if (!authState.isAuth) {
    return (
      <LoginScreen
        onSignIn={signInAndFetch}
        onImportCSV={importCSV}
        loading={loading}
        error={error}
        onClearError={()=>setError('')}
        clientId={clientId}
        setClientId={setClientId}
        tenantId={tenantId}
        setTenantId={setTenantId}
        isConfigured={!!clientId}
      />
    );
  }

  // ── Authenticated: Home screen (module selector) ──
  if (!module) {
    return (
      <HomeScreen
        onSelect={setModule}
        authState={authState}
        onSignOut={signOut}
        loading={loading}
        onRefresh={()=>loadAll(authState.token)}
        error={error}
        onClearError={()=>setError('')}
      />
    );
  }

  // ── Authenticated: helper (used in Gestão only) ──
  function addAnalystToProject(proj, analyst) {
    const updated={...proj,analysts:[...proj.analysts,analyst]};
    PHASES.forEach(ph=>{
      updated.phases={...updated.phases,[ph.key]:{...updated.phases[ph.key],pcts:[...(updated.phases[ph.key]?.pcts||[]),0]}};
    });
    setShowEdit(updated);
  }

  // ── Shared chrome ──
  const saveMsgBanner = saveMsg && (
    <div className={`slide-down sticky top-0 z-40 text-center py-2 text-sm font-medium ${
      saveMsg.type==='success'?'bg-emerald-600 text-white':
      saveMsg.type==='error'?'bg-red-600 text-white':'bg-amber-500 text-white'}`}>
      {saveMsg.text}
    </div>
  );
  const errorBanner = error && (
    <div className="mt-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-start gap-2 mx-4">
      <span className="flex-1 whitespace-pre-wrap">{error}</span>
      <button onClick={()=>setError('')} className="text-red-400 hover:text-red-600 shrink-0">✕</button>
    </div>
  );

  // ── Pulse module ──
  if (module==='pulse') {
    return (
      <div className="min-h-screen bg-slate-50">
        <AppHeader view={view} setView={setView} authState={authState}
          onSignOut={signOut} projectCount={projects.length} loading={loading}
          onRefresh={()=>loadAll(authState.token)} module={module} onHome={()=>setModule(null)}/>
        {saveMsgBanner}
        {errorBanner}
        <PulseView
          projects={projects}
          ciclos={ciclos}
          allAnalysts={analysts}
          onSave={savePulse}
          saving={saving}
        />
      </div>
    );
  }

  // ── Gestão module ──
  return (
    <div className="min-h-screen bg-slate-50">
      <AppHeader view={view} setView={setView} authState={authState}
        onSignOut={signOut} projectCount={projects.length} loading={loading}
        onRefresh={()=>loadAll(authState.token)} module={module} onHome={()=>setModule(null)}/>

      {saveMsgBanner}

      <main className="max-w-screen-2xl mx-auto px-4 pb-10">
        {ciclos.length>0&&(
          <div className="flex items-center gap-2 mt-3 mb-1">
            <span className="text-xs font-medium text-slate-500 shrink-0">Ciclo orçamentário:</span>
            <select value={cicloFilter} onChange={e=>setCicloFilter(e.target.value)}
              className="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white text-slate-700 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
              <option value="">Todos</option>
              {ciclos.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            {cicloFilter&&<span className="text-xs text-indigo-600 font-medium">{filteredProjects.length} projeto(s)</span>}
          </div>
        )}
        {error&&(
          <div className="mt-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-start gap-2">
            <span className="flex-1 whitespace-pre-wrap">{error}</span>
            <button onClick={()=>setError('')} className="text-red-400 hover:text-red-600">✕</button>
          </div>
        )}
        {view==='dashboard'&&(
          <DashboardView analysts={analysts} allocations={allocations} months={months}
            monthRange={monthRange} setMonthRange={setMonthRange} onAnalystClick={setShowAnalystDetail}/>
        )}
        {view==='monthly'&&(
          <MonthlyGrid analysts={analysts} allocations={allocations} months={months}

          <ProjectsView projects={filteredProjects} onEdit={p=>setShowEdit(p)} onNew={()=>setShowEdit('new')}
            getSuggestions={getSuggestions} onAddAnalyst={addAnalystToProject}/>
        )}
        {view==='suggestions'&&(
          <SuggestionsView projects={filteredProjects} getSuggestions={getSuggestions}
            onEdit={p=>setShowEdit(p)} onAddAnalyst={addAnalystToProject}/>
        )}
      </main>

      {showEdit&&(
        <ProjectModal
          project={showEdit==='new'?null:showEdit}
          allAnalysts={analysts}
          onSave={saveProject}
          onClose={()=>setShowEdit(null)}
          saving={saving}
          isSpConnected={authState.isAuth}

      )}
      {showAnalystDetail&&(

}

// ─── Month Range Picker ───────────────────────────────────────────────────────
function MonthRangePicker({monthRange,setMonthRange}) {
  const n=new Date();
  const cur=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  const shortcuts=[
    {label:'6m',fn:()=>{const e=new Date(n.getFullYear(),n.getMonth()+5,1);return{start:cur,end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};}},
    {label:'12m',fn:()=>{const e=new Date(n.getFullYear()+1,n.getMonth(),1);return{start:cur,end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};}},
    {label:'2025–26',fn:()=>({start:'2025-01',end:'2026-12'})},
  ];
  return (
    <div className="flex items-center gap-2 flex-wrap">
      <div className="flex items-center gap-1.5 bg-slate-100 rounded-lg px-2.5 py-1.5">
        <span className="text-slate-500 text-xs font-medium">Visualizando:</span>
        <input type="month" value={monthRange.start} onChange={e=>setMonthRange(p=>({...p,start:e.target.value}))}
          className="bg-transparent border-0 text-xs text-slate-700 focus:outline-none cursor-pointer"/>
        <span className="text-slate-400 text-xs">→</span>
        <input type="month" value={monthRange.end} onChange={e=>setMonthRange(p=>({...p,end:e.target.value}))}
          className="bg-transparent border-0 text-xs text-slate-700 focus:outline-none cursor-pointer"/>
      </div>
      <div className="flex gap-1">
        {shortcuts.map(s=>(
          <button key={s.label} onClick={()=>setMonthRange(s.fn())}
            className="text-xs px-2 py-1 rounded-md bg-white border border-slate-200 text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 transition">
            {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

          const max  = Math.max(...vals,0);
          return (
            <button key={analyst} onClick={()=>onAnalystClick(analyst)}
              className="bg-white rounded-xl border border-slate-200 p-4 text-left hover:border-indigo-300 hover:shadow-md transition group">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-semibold text-slate-800 group-hover:text-indigo-700 truncate">{analyst}</span>
                <TrafficDot pct={max}/>
              </div>
              <p className={`text-2xl font-bold ${max>100?'text-red-600':max>90?'text-yellow-600':'text-green-600'}`}>{max}%</p>
              <p className="text-xs text-slate-400 mt-0.5">pico no período</p>
              <div className="mt-3 flex gap-0.5">
                {months.slice(0,12).map(m=>{
                  const v = allocations[analyst]?.[m]||0;
                  const [y,mo] = m.split('-').map(Number);
                  const abbr = new Date(y,mo-1,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
                  const color = v>100?'#ef4444':v>90?'#ca8a04':v>0?'#16a34a':'#cbd5e1';
                  return (
                    <div key={m} className="flex-1 flex flex-col items-center" style={{minWidth:0}}>
                      <div className="w-full rounded-sm mb-0.5" style={{height:'5px',backgroundColor:color}}/>
                      <span className="text-slate-400 truncate w-full text-center leading-none" style={{fontSize:'7px'}}>{abbr}</span>
                      <span className="font-semibold truncate w-full text-center leading-none" style={{fontSize:'7px',color:v>0?color:'transparent'}}>{v>0?v+'%':'-'}</span>
                    </div>
                  );
                })}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Moskit Picker Modal ──────────────────────────────────────────────────────
function MoskitPickerModal({clientId, tenantId, onSelect, onClose}) {
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState('');
  const [filters, setFilters] = useState({id:'',nome:'',produto:'',status:'',prob:'',frente:'',ciclo:''});

  useEffect(()=>{
    fetchMoskitCSV(clientId, tenantId)
      .then(text=>{
        const parsed = Papa.parse(text,{header:true,skipEmptyLines:true});
        setRows(parsed.data||[]);
      })
      .catch(e=>setError('Erro ao carregar CSV: '+e.message))
      .finally(()=>setLoading(false));
  },[]);

  // Unique sorted values for select columns
  const selectOpts = useMemo(()=>{
    const opts={};
    MOSKIT_COLS.filter(c=>c.type==='select').forEach(c=>{
      opts[c.fk] = [...new Set(rows.map(r=>(r[c.key]||'').trim()).filter(Boolean))].sort();
    });
    return opts;
  },[rows]);

  const filtered = rows.filter(r=>
    MOSKIT_COLS.every(c=>{
      if (!filters[c.fk]) return true;
      const val = (r[c.key]||'').trim();
      return c.type==='select' ? val===filters[c.fk] : val.toLowerCase().includes(filters[c.fk].toLowerCase());
    })
  );

  return (
    <div className="modal-overlay" style={{zIndex:60}} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-6xl max-h-[90vh] flex flex-col mx-4"
        onClick={e=>e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0">
          <div>
            <h2 className="text-lg font-bold text-slate-800">Buscar no Moskit</h2>
            {!loading&&!error&&<p className="text-xs text-slate-400 mt-0.5">{filtered.length} de {rows.length} projetos · clique na linha para selecionar</p>}
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">✕</button>
        </div>
        <div className="flex-1 overflow-auto p-4">
          {loading&&<p className="text-center text-slate-400 py-12">⏳ Carregando lista do Moskit...</p>}
          {error&&<p className="text-center text-red-500 py-8">{error}</p>}
          {!loading&&!error&&(
            <table className="w-full text-xs border-collapse">
              <thead className="bg-slate-50 sticky top-0 z-10">
                <tr>
                  {MOSKIT_COLS.map(c=>(
                    <th key={c.fk} className="px-2 py-2 text-left font-semibold text-slate-500 border-b border-slate-200 whitespace-nowrap">
                      <div className="mb-1">{c.label}</div>
                      {c.type==='select' ? (
                        <select value={filters[c.fk]} onChange={e=>setFilters(f=>({...f,[c.fk]:e.target.value}))}
                          onClick={e=>e.stopPropagation()}
                          className="w-full border border-slate-200 rounded px-1 py-1 font-normal focus:ring-1 focus:ring-indigo-300 bg-white">
                          <option value="">Todos</option>
                          {(selectOpts[c.fk]||[]).map(v=><option key={v} value={v}>{v}</option>)}
                        </select>
                      ) : (
                        <input value={filters[c.fk]} onChange={e=>setFilters(f=>({...f,[c.fk]:e.target.value}))}
                          placeholder="Buscar..." onClick={e=>e.stopPropagation()}
                          className="w-full border border-slate-200 rounded px-2 py-1 font-normal focus:ring-1 focus:ring-indigo-300"/>
                      )}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.slice(0,300).map((row,i)=>(
                  <tr key={i} onClick={()=>onSelect(row)}
                    className="border-b border-slate-100 hover:bg-indigo-50 cursor-pointer transition">
                    {MOSKIT_COLS.map(c=>(
                      <td key={c.fk} className="px-2 py-1.5 text-slate-700">{row[c.key]||'—'}</td>
                    ))}
                  </tr>
                ))}
                {filtered.length>300&&(
                  <tr><td colSpan={MOSKIT_COLS.length} className="text-center text-slate-400 py-2">
                    Exibindo 300 de {filtered.length} — refine os filtros
                  </td></tr>
                )}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Project Modal (redesigned — per-analyst % per phase) ─────────────────────
function ProjectModal({project, allAnalysts, onSave, onClose, saving, isSpConnected, clientId, tenantId}) {
  const isExistingSP = !!(project?.spId);       // already in List_Pulse
  const isExistingLocal = project && !project?.spId; // tool-only project being edited
  // For new projects: default to SP if connected; user can toggle off
  const [syncToSP, setSyncToSP] = useState(isExistingSP ? true : (isSpConnected && !isExistingLocal));

  const [showMoskit, setShowMoskit] = useState(false);
  const [title,    setTitle]    = useState(project?.title||'');
  const [client,   setClient]   = useState(project?.client||'');
  const [status,   setStatus]   = useState(project?.status||'');
  const [ciclo,    setCiclo]    = useState(project?.ciclo||'');
  const [analysts, setAnalysts] = useState(project?.analysts ? [...project.analysts] : []);
  const [phases,   setPhases]   = useState(()=>{
    const p={};
    PHASES.forEach(ph=>{
      const ex = project?.phases?.[ph.key];
      p[ph.key] = {
        start: fmtDateForInput(ex?.start)||'',
        end:   fmtDateForInput(ex?.end)||'',
        pcts:  ex?.pcts ? [...ex.pcts] : [],
      };
    });
    return p;
  });

  // Keep pcts arrays in sync when analysts list changes
  function syncPctsLength(newAnalysts, prevPhases) {
    const updated={};
    PHASES.forEach(ph=>{
      const cur = prevPhases[ph.key].pcts||[];
      updated[ph.key] = {...prevPhases[ph.key], pcts: newAnalysts.map((_,i)=>cur[i]||0)};
    });
    return updated;
  }

  function addAnalyst() {
    const newA = [...analysts,''];
    setAnalysts(newA);
    setPhases(prev=>syncPctsLength(newA,prev));
  }
  function removeAnalyst(idx) {
    const newA = analysts.filter((_,i)=>i!==idx);
    setAnalysts(newA);
    setPhases(prev=>{
      const updated={};
      PHASES.forEach(ph=>{
        const pcts=[...prev[ph.key].pcts];
        pcts.splice(idx,1);
        updated[ph.key]={...prev[ph.key],pcts};
      });
      return updated;
    });
  }
  function updateAnalystName(idx,name) {
    setAnalysts(prev=>prev.map((a,i)=>i===idx?name:a));
  }
  function updatePhaseField(phKey,field,val) {
    setPhases(prev=>({...prev,[phKey]:{...prev[phKey],[field]:val}}));
  }
  function updatePct(phKey,idx,val) {
    setPhases(prev=>{
      const pcts=[...prev[phKey].pcts];
      pcts[idx]=Math.max(0,parseFloat(val)||0);
      return {...prev,[phKey]:{...prev[phKey],pcts}};
    });
  }

  function handleSave() {
    if (!title.trim()) return;
    const filteredA = analysts.filter(a=>a.trim());
    // Remove pcts for empty analyst rows
    const filteredPhases={};
    PHASES.forEach(ph=>{
      const pcts = analysts.map((a,i)=>a.trim()?phases[ph.key].pcts[i]||0:null).filter(p=>p!==null);
      filteredPhases[ph.key]={...phases[ph.key], pcts};
    });
    // source: 'sharepoint' → goes to List_Pulse + dist file
    //         'local'      → goes to dist file only (shared via SP JSON)
    const source = isExistingSP ? 'sharepoint'
                 : (syncToSP && isSpConnected ? 'sharepoint' : 'local');
    onSave({
      id:     project?.id||'proj_'+Date.now(),
      spId:   project?.spId||null,
      title:  title.trim(),
      client: client.trim(),
      status,
      ciclo:  ciclo.trim(),
      source,
      analysts: filteredA,
      phases:   filteredPhases,
    });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[92vh] flex flex-col mx-4"
        onClick={e=>e.stopPropagation()}>

        {/* Sticky header */}
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0 rounded-t-2xl">
          <div>
            <h2 className="text-lg font-bold text-slate-800">{project?'Editar Projeto':'Novo Projeto'}</h2>
            <p className="text-xs text-slate-400 mt-0.5">
              {isExistingSP ? '📋 Projeto do SharePoint — alterações sincronizam automaticamente'
               : isExistingLocal ? '🗂️ Projeto da ferramenta — salvo no arquivo compartilhado'
               : isSpConnected ? 'Novo projeto' : '⚠️ Sem conexão — salvo apenas nesta sessão'}
            </p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">✕</button>
        </div>

        {/* Scrollable body */}
        <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6">

          {/* ── Informações Gerais ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Informações Gerais</h3>
              {!project&&(
                <button type="button" onClick={()=>setShowMoskit(true)}
                  className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition flex items-center gap-1">
                  🔍 Buscar no Moskit
                </button>
              )}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div className="sm:col-span-2">
                <label className="block text-xs font-medium text-slate-600 mb-1">Nome do Programa *</label>
                <input value={title} onChange={e=>setTitle(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"
                  placeholder="Ex: BASF — Trainee 2026"/>
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-600 mb-1">Cliente</label>
                <input value={client} onChange={e=>setClient(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"/>
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-600 mb-1">Status</label>
                <select value={status} onChange={e=>setStatus(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200">

              <div className="sm:col-span-2">

                <input value={ciclo} onChange={e=>setCiclo(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"
                  placeholder="Ex: 2026"/>
              </div>
            </div>
          </section>
          {showMoskit&&(
            <MoskitPickerModal clientId={clientId} tenantId={tenantId}
              onClose={()=>setShowMoskit(false)}
              onSelect={row=>{
                setTitle(row['Nome']||'');
                setCiclo(row['Ciclo Or\u00e7ament\u00e1rio']||'');
                setShowMoskit(false);
              }}/>
          )}

          {/* ── Analistas ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Analistas Alocados</h3>
              <button onClick={addAnalyst}
                className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition">
                + Adicionar Analista
              </button>
            </div>
            {analysts.length===0?(
              <p className="text-slate-400 text-sm italic py-2">Nenhum analista adicionado. Use o botão acima.</p>
            ):(
              <div className="space-y-2">
                {analysts.map((a,idx)=>(
                  <div key={idx} className="flex items-center gap-2">
                    <span className="text-xs text-slate-400 w-24 shrink-0">Analista {idx+1}</span>
                    <input value={a} onChange={e=>updateAnalystName(idx,e.target.value)}
                      list="analystDatalist"
                      className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200"
                      placeholder="Nome do analista"/>
                    <button onClick={()=>removeAnalyst(idx)}
                      className="w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition text-lg leading-none shrink-0">
                      ×
                    </button>
                  </div>
                ))}
              </div>
            )}
            <datalist id="analystDatalist">
              {allAnalysts.map(a=><option key={a} value={a}/>)}
            </datalist>
          </section>

          {/* ── Fases e Alocação ── */}
          <section>
            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Fases e Percentuais</h3>
            <div className="space-y-2">
              {PHASES.map(ph=>{
                const phase = phases[ph.key];
                const total = totalPhasePct(phase);
                const hasDate = phase.start||phase.end;
                return (
                  <div key={ph.key} className="border border-slate-200 rounded-xl overflow-hidden">
                    {/* Phase header row */}
                    <div className="bg-slate-50 px-4 py-2.5 flex items-center gap-2 flex-wrap">
                      <span className="text-sm font-semibold text-slate-700 w-36 shrink-0">{ph.label}</span>
                      <div className="flex items-center gap-1.5">
                        <input type="date" value={phase.start} onChange={e=>updatePhaseField(ph.key,'start',e.target.value)}
                          className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                        <span className="text-slate-300 text-xs">→</span>
                        <input type="date" value={phase.end} onChange={e=>updatePhaseField(ph.key,'end',e.target.value)}
                          className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                      </div>
                      {total>0&&(
                        <span className={`ml-auto text-xs font-bold px-2 py-0.5 rounded-full ${
                          total>100?'bg-red-100 text-red-700':total>90?'bg-yellow-100 text-yellow-700':'bg-green-100 text-green-700'}`}>
                          Total: {Math.round(total)}%
                        </span>
                      )}
                    </div>

                    {/* Per-analyst pct rows */}
                    {analysts.length>0?(
                      <div className="divide-y divide-slate-50">
                        {analysts.map((a,idx)=>(
                          <div key={idx} className="flex items-center gap-3 px-4 py-2">
                            <span className="text-xs text-slate-500 flex-1 truncate">{a||`Analista ${idx+1}`}</span>
                            <div className="flex items-center gap-1.5 shrink-0">
                              <input type="number" min={0} max={200} step={5}
                                value={phase.pcts[idx]!==undefined?phase.pcts[idx]:''}
                                onChange={e=>updatePct(ph.key,idx,e.target.value)}
                                className="border border-slate-200 rounded-lg px-2 py-1 text-xs w-20 text-right focus:ring-1 focus:ring-indigo-300"
                                placeholder="0"/>
                              <span className="text-xs text-slate-400 w-4">%</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ):(
                      <p className="px-4 py-2 text-xs text-slate-400 italic">Adicione analistas acima para definir % por pessoa e fase.</p>
                    )}
                  </div>
                );
              })}
            </div>
          </section>
        </div>

        {/* Sticky footer */}
        <div className="px-6 py-4 border-t border-slate-200 flex items-center justify-between gap-3 shrink-0 rounded-b-2xl bg-white flex-wrap">
          {/* SP sync toggle — only for NEW projects when SP connected */}
          {!isExistingSP && !isExistingLocal && isSpConnected ? (
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <div onClick={()=>setSyncToSP(v=>!v)}
                className={`relative w-9 h-5 rounded-full transition ${syncToSP?'bg-indigo-600':'bg-slate-300'}`}>
                <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${syncToSP?'translate-x-4':'translate-x-0.5'}`}/>
              </div>
              <span className="text-xs text-slate-600">
                {syncToSP ? '📋 Adicionar ao SharePoint (List_Pulse)' : '🗂️ Salvar apenas na ferramenta'}
              </span>
            </label>
          ) : (
            <p className="text-xs text-slate-400">
              {isExistingSP ? '💾 Salva no SharePoint + distribução no arquivo'
               : isExistingLocal ? '🗂️ Salva no arquivo compartilhado (alocacao_dist.json)'
               : '⚠️ Sem conexão — visível só nesta sessão'}
            </p>
          )}
          <div className="flex gap-2 ml-auto">
            <button onClick={onClose} className="border border-slate-300 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-slate-50 transition">
              Cancelar
            </button>
            <button onClick={handleSave} disabled={!title.trim()||saving}
              className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-5 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
              {saving?'⏳ Salvando...':(project?'💾 Salvar':'➕ Criar Projeto')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const projs = allProjects.filter(p=>p.analysts.includes(analyst));

    const phases = PHASES.map(ph=>({
      ...ph,
      phase: proj.phases[ph.key],
      pct:   proj.phases[ph.key]?.pcts?.[idx]||0,

    <div className="modal-overlay" onClick={onClose}>

          <div>
            <h2 className="text-lg font-bold text-slate-800">{analyst}</h2>

        <div className="px-6 py-4 space-y-4">
          {grouped.length===0&&<p className="text-slate-400 text-sm italic py-8 text-center">Nenhuma fase com datas e % preenchidos.</p>}
          {grouped.map(({proj,phases})=>(
            <div key={proj.id} className="border border-slate-200 rounded-xl overflow-hidden">
              <div className="bg-slate-50 px-4 py-2.5 flex items-center gap-2">

                {proj.client&&<span className="text-xs text-slate-400">{proj.client}</span>}

                    <th className="px-3 py-1.5 text-slate-500 font-medium text-center">Período</th>

                    return (
                      <tr key={key} className="border-t border-slate-50 hover:bg-indigo-50/30">
                        <td className="px-4 py-2 font-medium text-slate-700">{label}</td>

// ─── Pulse View ───────────────────────────────────────────────────────────────
function PulseView({projects, ciclos, allAnalysts, onSave, saving}) {
  const [filters, setFilters] = useState({ciclo:'', analista:'', head:'', ka:'', client:'', nome:''});
  const [editProject, setEditProject] = useState(null);

  // Only SP projects are editable via Pulse
  const spProjects = projects.filter(p=>p.source==='sharepoint');

  const filtered = useMemo(()=>spProjects.filter(p=>{
    if (filters.ciclo   && p.ciclo!==filters.ciclo) return false;
    if (filters.client  && !(p.client||'').toLowerCase().includes(filters.client.toLowerCase())) return false;
    if (filters.nome    && !(p.title||'').toLowerCase().includes(filters.nome.toLowerCase())) return false;
    if (filters.ka      && !(p.ka||'').toLowerCase().includes(filters.ka.toLowerCase())) return false;
    if (filters.analista && !p.analysts.some(a=>(a||'').toLowerCase().includes(filters.analista.toLowerCase()))) return false;
    if (filters.head    && ![p.head1,p.head2,p.head3].some(h=>(h||'').toLowerCase().includes(filters.head.toLowerCase()))) return false;
    return true;
  }), [spProjects, filters]);

  const hasFilters = Object.values(filters).some(Boolean);

  async function handleSave(updated) {
    await onSave(updated);
    setEditProject(null);
  }

  if (spProjects.length===0) return (
    <div className="mt-16 text-center text-slate-400">
      <p className="text-4xl mb-3">📋</p>
      <p className="text-lg font-medium">Nenhum registro da List_Pulse carregado.</p>
    </div>
  );

  return (
    <div className="fade-in max-w-screen-2xl mx-auto px-4 pb-10 mt-4 space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-lg font-bold text-slate-800">List_Pulse</h2>
        <span className="text-xs text-slate-500">{filtered.length} de {spProjects.length} registros</span>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">Ciclo Orç.</label>
            <select value={filters.ciclo} onChange={e=>setFilters(f=>({...f,ciclo:e.target.value}))}
              className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200 bg-white">
              <option value="">Todos</option>
              {ciclos.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          {[
            {key:'nome',     label:'Nome do Processo'},
            {key:'client',   label:'Cliente'},
            {key:'ka',       label:'KA'},
            {key:'head',     label:'Head (1/2/3)'},
            {key:'analista', label:'Analista'},
          ].map(f=>(
            <div key={f.key}>
              <label className="block text-xs font-medium text-slate-500 mb-1">{f.label}</label>
              <input value={filters[f.key]} onChange={e=>setFilters(ff=>({...ff,[f.key]:e.target.value}))}
                placeholder="Buscar..."
                className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200"/>
            </div>
          ))}
        </div>
        {hasFilters&&(
          <button onClick={()=>setFilters({ciclo:'',analista:'',head:'',ka:'',client:'',nome:''})}
            className="mt-3 text-xs text-indigo-600 hover:text-indigo-800 font-medium">
            ✕ Limpar filtros

      </div>

      {/* Results table */}
      <div className="scroll-table bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="min-w-full text-xs border-collapse">
          <thead>
            <tr className="bg-slate-50 border-b border-slate-200">

              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 min-w-52">Nome do Processo</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Cliente</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Status</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Ciclo</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">KA</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Head 1</th>
              <th className="px-3 py-2.5 text-left font-semibold text-slate-500 whitespace-nowrap">Head 2</th>

                    Editar

            ))}

      {editProject&&(

  );
}

// ─── Pulse Edit Modal (all List_Pulse fields, collapsible sections) ───────────
function PulseEditModal({project, allAnalysts, onSave, onClose, saving}) {
  // Core fields
  const [title,    setTitle]    = useState(project?.title||'');
  const [client,   setClient]   = useState(project?.client||'');
  const [status,   setStatus]   = useState(project?.status||'');
  const [ciclo,    setCiclo]    = useState(project?.ciclo||'');
  const [ka,       setKa]       = useState(project?.ka||'');
  const [head1,    setHead1]    = useState(project?.head1||'');
  const [head2,    setHead2]    = useState(project?.head2||'');
  const [head3,    setHead3]    = useState(project?.head3||'');
  // Analysts & phases
  const [analysts, setAnalysts] = useState(project?.analysts ? [...project.analysts] : []);
  const [phases,   setPhases]   = useState(()=>{
    const p={}; PHASES.forEach(ph=>{
      const ex=project?.phases?.[ph.key];
      p[ph.key]={start:fmtDateForInput(ex?.start)||'',end:fmtDateForInput(ex?.end)||'',pcts:ex?.pcts?[...ex.pcts]:[]};
    }); return p;
  });
  // Pulse extra fields
  const [pulseData, setPulseData] = useState(()=>{
    const d={}; PULSE_FIELDS.forEach(f=>{d[f.k]=project?.pulseData?.[f.k]||'';}); return d;
  });
  // Section collapse state — start all collapsed except first two
  const [collapsed, setCollapsed] = useState(()=>{
    const c={};
    PULSE_SECTIONS.forEach((s,i)=>{ c[s]=i>=2; }); // first 2 sections open, rest collapsed
    c['_identificacao_basica'] = false;
    c['Analistas e Fases'] = false;
    return c;
  });

  function toggleSec(s) { setCollapsed(c=>({...c,[s]:!c[s]})); }
  function updatePulse(k,v) { setPulseData(p=>({...p,[k]:v})); }

  function syncPctsLength(newA,prevPh){
    const u={}; PHASES.forEach(ph=>{ const c=prevPh[ph.key].pcts||[]; u[ph.key]={...prevPh[ph.key],pcts:newA.map((_,i)=>c[i]||0)}; }); return u;
  }
  function addAnalyst(){ const a=[...analysts,'']; setAnalysts(a); setPhases(p=>syncPctsLength(a,p)); }
  function removeAnalyst(idx){
    const a=analysts.filter((_,i)=>i!==idx); setAnalysts(a);
    setPhases(p=>{ const u={}; PHASES.forEach(ph=>{ const pc=[...p[ph.key].pcts]; pc.splice(idx,1); u[ph.key]={...p[ph.key],pcts:pc}; }); return u; });
  }
  function updAnalystName(idx,v){ setAnalysts(p=>p.map((a,i)=>i===idx?v:a)); }
  function updPhaseField(ph,f,v){ setPhases(p=>({...p,[ph]:{...p[ph],[f]:v}})); }
  function updPct(ph,idx,v){ setPhases(p=>{ const pc=[...p[ph].pcts]; pc[idx]=Math.max(0,parseFloat(v)||0); return {...p,[ph]:{...p[ph],pcts:pc}}; }); }

  function handleSave(){
    if (!title.trim()) return;
    const fA=analysts.filter(a=>a.trim());
    const fPh={}; PHASES.forEach(ph=>{ const pc=analysts.map((a,i)=>a.trim()?phases[ph.key].pcts[i]||0:null).filter(p=>p!==null); fPh[ph.key]={...phases[ph.key],pcts:pc}; });
    onSave({...project, title:title.trim(), client:client.trim(), status, ciclo:ciclo.trim(),
      ka:ka.trim(), head1:head1.trim(), head2:head2.trim(), head3:head3.trim(),
      analysts:fA, phases:fPh, pulseData});
  }

  // Shared input classes
  const cls = 'w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200';

  // Render a single PULSE_FIELDS entry
  function renderPulseField(f){
    const v=pulseData[f.k]||'';
    if (f.t==='select') return (
      <select value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}>
        <option value="">—</option>
        {(f.o||[]).map(op=><option key={op} value={op}>{op}</option>)}
      </select>
    );
    if (f.t==='textarea') return <textarea value={v} onChange={e=>updatePulse(f.k,e.target.value)} rows={3} className={cls+' resize-none'}/>;
    if (f.t==='date') return <input type="date" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
    if (f.t==='number') return <input type="number" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
    return <input type="text" value={v} onChange={e=>updatePulse(f.k,e.target.value)} className={cls}/>;
  }

  // Section header button
  function SecHeader({id,label,icon,count}){
    const open=!collapsed[id];
    return (
      <button onClick={()=>toggleSec(id)} className="w-full flex items-center gap-2 text-left py-1">
        <span className="text-sm">{icon}</span>
        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest flex-1">{label}</span>
        {count&&<span className="text-xs text-slate-400">{count} campos</span>}
        <span className={`text-slate-400 text-xs transition-transform ${open?'rotate-180':''}`}>▾</span>
      </button>
    );
  }

  // Render a section from PULSE_FIELDS (excluding Etapas)
  function renderSection(sLabel){
    const fields=PULSE_FIELDS.filter(f=>f.s===sLabel&&!f.etapa);
    if (!fields.length) return null;
    return (
      <section key={sLabel} className="border border-slate-200 rounded-xl overflow-hidden">
        <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
          <SecHeader id={sLabel} label={sLabel} count={fields.length}/>
        </div>
        {!collapsed[sLabel]&&(
          <div className="px-4 py-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
            {fields.map(f=>(
              <div key={f.k} className={f.w?'sm:col-span-2':''}>
                <label className="block text-xs font-medium text-slate-600 mb-1">{f.l}</label>
                {renderPulseField(f)}
              </div>
            ))}
          </div>
        )}
      </section>
    );
  }

  const normalSections = PULSE_SECTIONS.filter(s=>s!=='Etapas de Avaliação');

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col mx-4"
        onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0 rounded-t-2xl">
          <div>
            <h2 className="text-lg font-bold text-slate-800">Editar — Pulse</h2>
            <p className="text-xs text-slate-400 mt-0.5">#{project?.indice} · {project?.title}</p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setCollapsed(c=>{const n={};Object.keys(c).forEach(k=>{n[k]=false;});return n;})}
              className="text-xs text-indigo-600 hover:text-indigo-800 border border-indigo-200 px-2 py-1 rounded-lg">
              Expandir tudo
            </button>
            <button onClick={onClose} className="text-slate-400 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">✕</button>
          </div>
        </div>

        {/* Scrollable body */}
        <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">

          {/* ── Identificação Básica ── */}
          <section className="border border-slate-200 rounded-xl overflow-hidden">
            <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
              <SecHeader id="_identificacao_basica" label="Identificação Básica" icon="🏷️"/>
            </div>
            {!collapsed['_identificacao_basica']&&(
              <div className="px-4 py-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div className="sm:col-span-2">
                  <label className="block text-xs font-medium text-slate-600 mb-1">Nome do Processo *</label>
                  <input value={title} onChange={e=>setTitle(e.target.value)} className={cls} placeholder="Nome do programa"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Cliente</label>
                  <input value={client} onChange={e=>setClient(e.target.value)} className={cls}/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Status do Programa</label>
                  <select value={status} onChange={e=>setStatus(e.target.value)} className={cls}>
                    <option value="">—</option>
                    <option>Em andamento</option><option>Concluído</option>
                    <option>Cancelado</option><option>Planejamento</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-600 mb-1">Ciclo Orçamentário</label>
                  <input value={ciclo} onChange={e=>setCiclo(e.target.value)} className={cls} placeholder="Ex: 2026"/>
                </div>
                {/* Identificação PULSE_FIELDS */}
                {PULSE_FIELDS.filter(f=>f.s==='Identificação').map(f=>(
                  <div key={f.k} className={f.w?'sm:col-span-2':''}>
                    <label className="block text-xs font-medium text-slate-600 mb-1">{f.l}</label>
                    {renderPulseField(f)}
                  </div>
                ))}
              </div>
            )}
          </section>

          {/* ── Gestão e Responsáveis — includes KA / Head ── */}
          <section className="border border-slate-200 rounded-xl overflow-hidden">
            <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
              <SecHeader id="Gestão e Responsáveis" label="Gestão e Responsáveis" icon="👥"/>
            </div>
            {!collapsed['Gestão e Responsáveis']&&(
              <div className="px-4 py-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label className="block text-xs font-medium text-slate-600 mb-1">KA</label>
                  <input value={ka} onChange={e=>setKa(e.target.value)} className={cls} placeholder="Nome do KA"/></div>
                <div><label className="block text-xs font-medium text-slate-600 mb-1">Head 1</label>
                  <input value={head1} onChange={e=>setHead1(e.target.value)} className={cls}/></div>
                <div><label className="block text-xs font-medium text-slate-600 mb-1">Head 2</label>
                  <input value={head2} onChange={e=>setHead2(e.target.value)} className={cls}/></div>
                <div><label className="block text-xs font-medium text-slate-600 mb-1">Head 3</label>
                  <input value={head3} onChange={e=>setHead3(e.target.value)} className={cls}/></div>
                {PULSE_FIELDS.filter(f=>f.s==='Gestão e Responsáveis').map(f=>(
                  <div key={f.k} className={f.w?'sm:col-span-2':''}>
                    <label className="block text-xs font-medium text-slate-600 mb-1">{f.l}</label>
                    {renderPulseField(f)}
                  </div>
                ))}
              </div>
            )}
          </section>

          {/* ── Remaining PULSE_FIELDS sections ── */}
          {normalSections.filter(s=>s!=='Identificação'&&s!=='Gestão e Responsáveis').map(s=>renderSection(s))}

          {/* ── Etapas de Avaliação ── */}
          <section className="border border-slate-200 rounded-xl overflow-hidden">
            <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
              <SecHeader id="Etapas de Avaliação" label="Etapas de Avaliação" icon="📋" count="5 etapas"/>
            </div>
            {!collapsed['Etapas de Avaliação']&&(
              <div className="divide-y divide-slate-100">
                {[1,2,3,4,5].map(n=>{
                  const ef=PULSE_FIELDS.filter(f=>f.etapa===n);
                  return (
                    <div key={n} className="px-4 py-3">
                      <p className="text-xs font-bold text-indigo-600 mb-2">Etapa {n}</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {ef.map(f=>(
                          <div key={f.k} className={f.w?'sm:col-span-2':''}>
                            <label className="block text-xs font-medium text-slate-600 mb-1">{f.l}</label>
                            {renderPulseField(f)}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </section>

          {/* ── Analistas e Fases ── */}
          <section className="border border-slate-200 rounded-xl overflow-hidden">
            <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200">
              <SecHeader id="Analistas e Fases" label="Analistas e Fases (Alocação)" icon="📊"/>
            </div>
            {!collapsed['Analistas e Fases']&&(
              <div className="px-4 py-4 space-y-4">
                {/* Analistas */}
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Analistas</p>
                    <button onClick={addAnalyst} className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition">
                      + Adicionar
                    </button>
                  </div>
                  {analysts.length===0
                    ? <p className="text-slate-400 text-sm italic">Nenhum analista adicionado.</p>
                    : <div className="space-y-2">
                        {analysts.map((a,idx)=>(
                          <div key={idx} className="flex items-center gap-2">
                            <span className="text-xs text-slate-400 w-20 shrink-0">Analista {idx+1}</span>
                            <input value={a} onChange={e=>updAnalystName(idx,e.target.value)} list="pulseAnalystDL"
                              className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200"/>
                            <button onClick={()=>removeAnalyst(idx)} className="w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 rounded-full text-lg shrink-0">×</button>
                          </div>
                        ))}
                      </div>
                  }
                  <datalist id="pulseAnalystDL">{allAnalysts.map(a=><option key={a} value={a}/>)}</datalist>
                </div>
                {/* Fases */}
                <div className="space-y-2">
                  <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Fases e %</p>
                  {PHASES.map(ph=>{
                    const phase=phases[ph.key]; const total=totalPhasePct(phase);
                    return (
                      <div key={ph.key} className="border border-slate-200 rounded-xl overflow-hidden">
                        <div className="bg-slate-50 px-4 py-2 flex items-center gap-2 flex-wrap">
                          <span className="text-sm font-semibold text-slate-700 w-32 shrink-0">{ph.label}</span>
                          <div className="flex items-center gap-1.5">
                            <input type="date" value={phase.start} onChange={e=>updPhaseField(ph.key,'start',e.target.value)}
                              className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                            <span className="text-slate-300 text-xs">→</span>
                            <input type="date" value={phase.end} onChange={e=>updPhaseField(ph.key,'end',e.target.value)}
                              className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                          </div>
                          {total>0&&<span className={`ml-auto text-xs font-bold px-2 py-0.5 rounded-full ${total>100?'bg-red-100 text-red-700':total>90?'bg-yellow-100 text-yellow-700':'bg-green-100 text-green-700'}`}>Total: {Math.round(total)}%</span>}
                        </div>
                        {analysts.length>0
                          ? <div className="divide-y divide-slate-50">
                              {analysts.map((a,idx)=>(
                                <div key={idx} className="flex items-center gap-3 px-4 py-2">
                                  <span className="text-xs text-slate-500 flex-1 truncate">{a||`Analista ${idx+1}`}</span>
                                  <input type="number" min={0} max={200} step={5}
                                    value={phase.pcts[idx]!==undefined?phase.pcts[idx]:''} onChange={e=>updPct(ph.key,idx,e.target.value)}
                                    className="border border-slate-200 rounded-lg px-2 py-1 text-xs w-20 text-right focus:ring-1 focus:ring-indigo-300" placeholder="0"/>
                                  <span className="text-xs text-slate-400">%</span>
                                </div>
                              ))}
                            </div>
                          : <p className="px-4 py-2 text-xs text-slate-400 italic">Adicione analistas acima.</p>
                        }
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </section>
        </div>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-slate-200 flex items-center justify-end gap-3 shrink-0 rounded-b-2xl bg-white">
          <p className="text-xs text-slate-400 mr-auto">💾 Salva no SharePoint (List_Pulse)</p>
          <button onClick={onClose} className="border border-slate-300 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-slate-50 transition">Cancelar</button>
          <button onClick={handleSave} disabled={!title.trim()||saving}
            className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-5 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
            {saving?'⏳ Salvando...':'💾 Salvar'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
