function calSoD(d)       { return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function calAddDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function calSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function calGetWeekDays(date) { const d=calSoD(date); return Array.from({length:7},(_,i)=>calAddDays(d,i-d.getDay())); }
function calGetMonthGrid(yr,mo) { const f=new Date(yr,mo,1); const s=calAddDays(f,-f.getDay()); return Array.from({length:42},(_,i)=>calAddDays(s,i)); }
function calFmt(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }

};
const CAL_STATUS_ORDER = ['critical','warning','active','planned','done'];
function calPhaseStatus(start, end, today) {
  const s=calSoD(start), e=calSoD(end), t=calSoD(today||new Date());
  if (e<t) return 'done';
  if (s>t) return 'planned';
  const daysLeft=Math.round((e-t)/864e5);
  if (daysLeft<=3) return 'critical';
  if (daysLeft<=7) return 'warning';
  return 'active';
}

// ─── Date Helpers (always LOCAL midnight — never UTC) ──────────────────────────
function parseSPDate(v) {
  if (!v) return null;
  const s = String(v).trim();
  if (!s) return null;
  if (s.includes('T')) {
    const [y,m,d] = s.split('T')[0].split('-').map(Number);
    return new Date(y, m-1, d);
  }
  if (s.includes('/')) {
    const [d,m,y] = s.split(' ')[0].split('/').map(Number);
    if (y&&m&&d) return new Date(y, m-1, d);
  }
  if (s.includes('-')) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  return null;
}
function fmtDateForInput(raw) {          // → YYYY-MM-DD for <input type="date">
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateForSP(raw) {             // → "YYYY-MM-DDTHH:mm:ssZ" (avoids UTC shift)
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T00:00:00Z`;
}
function fmtDateDisplay(raw) {
  const d = parseSPDate(raw);
  if (!d||isNaN(d)) return '—';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function monthKey(date) {
  const d = typeof date==='string' ? parseSPDate(date) : date;
  if (!d||isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(mk) {
  if (!mk) return '';
  const [y,m] = mk.split('-');
  return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m)-1]+'/'+y;
}
function rangeMonths(start, end) {
  if (!start||!end) return [];
  const [sy,sm] = start.split('-').map(Number);
  const [ey,em] = end.split('-').map(Number);
  if (!sy||!sm||!ey||!em) return [];
  const s = new Date(sy, sm-1, 1);
  const e = new Date(ey, em-1, 1);
  const out = []; let cur = new Date(s);
  while (cur<=e && out.length<36) {
    out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`);
    cur.setMonth(cur.getMonth()+1);
  }
  return out;
}
function daysOverlapInMonth(startRaw, endRaw, mk) {
  if (!startRaw||!endRaw||!mk) return 0;
  const [y,m] = mk.split('-').map(Number);
  const mS = new Date(y,m-1,1), mE = new Date(y,m,0);
  const phS = parseSPDate(startRaw), phE = parseSPDate(endRaw);
  if (!phS||!phE) return 0;
  const oS = phS>mS?phS:mS, oE = phE<mE?phE:mE;
  return Math.max(0, Math.round((oE-oS)/(864e5))+1);
}

// ─── PCT Helpers ──────────────────────────────────────────────────────────────
function parsePct(v) {
  if (!v&&v!==0) return 0;
  const s = String(v).trim();
  if (!s||s==='0') return 0;
  if (s.includes('%')) return parseFloat(s.replace('%','').replace(',','.')) || 0;
  return (parseFloat(s.replace(',','.')) || 0) * 100;
}
function pctToSP(pct) { return pct/100; }
function totalPhasePct(phase) { return (phase?.pcts||[]).reduce((a,b)=>a+(b||0), 0); }

// ─── Parse SharePoint Item → internal model ───────────────────────────────────
// phases[key].pcts     = number[] (one per analyst, same order as analysts[])
// headPhases[key].pcts = number[] (one per head,    same order as head1/2/3)
function parseSPItem(item) {
  const analysts = ANALYST_KEYS
    .map(k=>(item[k]||'').trim())
    .filter(a=>a&&a!==PLACEHOLDER);
  const n = Math.max(analysts.length, 1);
  const phases = {};
  PHASES.forEach(ph=>{
    const tot      = parsePct(item[`Analista_${ph.key}_PCT`]);
    const perEach  = tot>0 ? Math.round(tot/n) : 0;
    phases[ph.key] = {
      start: item[`Inicio_${ph.key}`]||null,
      end:   item[`Fim_${ph.key}`]||null,
      pcts:  analysts.map(()=>perEach),   // equal split — user can adjust
    };
  });
  // Head phases — same structure; total comes from Consultor_Head_${ph.key}_PCT
  const projHeadNames = HEAD_KEYS.map(k=>(item[k]||'').trim()).filter(h=>h&&h!==PLACEHOLDER);
  const nh = Math.max(projHeadNames.length, 1);
  const headPhases = {};
  PHASES.forEach(ph=>{
    const tot     = parsePct(item[HEAD_PCT_COLS[ph.key]]);
    const perEach = tot>0 ? Math.round(tot/nh) : 0;
    headPhases[ph.key] = {
      start: item[`Inicio_${ph.key}`]||null,
      end:   item[`Fim_${ph.key}`]||null,
      pcts:  projHeadNames.map(()=>perEach),  // equal split — user can adjust
    };
  });
  // Populate pulseData from PULSE_FIELDS — date fields converted to input format
  const pulseData = {};
  PULSE_FIELDS.forEach(f => {
    const raw = item[f.k];
    pulseData[f.k] = (f.t==='date') ? (fmtDateForInput(raw)||'') : (raw!==undefined&&raw!==null ? String(raw) : '');
  });
  return {
    id:         String(item.Id||item.indice||'r'+Math.random()),
    spId:       item.Id||item.id||null,
    indice:     Number(item.indice)||0,
    title:      item.Nome_Programa||item.Title||'Sem título',
    client:     item.Cliente||'',
    status:     item.Status_Programa||'',
    ciclo:      item.Ciclo_Orcamentario||'',
    ka:         item.KA||'',
    head1:      item.Head_1||'',
    head2:      item.Head_2||'',
    head3:      item.Head_3||'',
    source:     'sharepoint',
    analysts,
    phases,
    headPhases,
    pulseData,
  };
}

// ─── Build SP PATCH/POST payload from internal project ────────────────────────
function buildSPPayload(project) {
  const payload = {};
  if (project.ciclo  !== undefined) payload['Ciclo_Orcamentario'] = project.ciclo||null;
  if (project.ka     !== undefined) payload['KA']     = project.ka||null;
  if (project.head1  !== undefined) payload['Head_1'] = project.head1||null;
  if (project.head2  !== undefined) payload['Head_2'] = project.head2||null;
  if (project.head3  !== undefined) payload['Head_3'] = project.head3||null;
  for (let i=0; i<MAX_ANALYSTS; i++) {
    payload[`Analista_${i+1}`] = project.analysts[i]||null;
  }
  PHASES.forEach(ph=>{
    const phase     = project.phases[ph.key]||{};
    const headPhase = project.headPhases?.[ph.key]||{};
    const total     = totalPhasePct(phase);
    const headTotal = totalPhasePct(headPhase);
    payload[`Inicio_${ph.key}`]       = phase.start ? fmtDateForSP(phase.start) : null;
    payload[`Fim_${ph.key}`]          = phase.end   ? fmtDateForSP(phase.end)   : null;
    payload[`Analista_${ph.key}_PCT`] = pctToSP(total);
    const headCol = HEAD_PCT_COLS[ph.key];
    if (headCol) payload[headCol]     = pctToSP(headTotal);
  });
  return payload;
}

// ─── Compute Allocations (day-weighted, per-analyst pct) ──────────────────────
function computeAllocations(projects) {
  const result = {};
  projects.forEach(proj=>{
    proj.analysts.forEach((analyst, idx)=>{
      if (!analyst) return;
      if (!result[analyst]) result[analyst]={};
      PHASES.forEach(ph=>{
        const phase = proj.phases[ph.key];
        const pct   = phase?.pcts?.[idx]||0;
        if (!phase?.start||!phase?.end||!pct) return;
        const sMk = monthKey(parseSPDate(phase.start));
        const eMk = monthKey(parseSPDate(phase.end));
        if (!sMk||!eMk) return;
        rangeMonths(sMk,eMk).forEach(mk=>{
          const [y,m] = mk.split('-').map(Number);
          const dim   = new Date(y,m,0).getDate();
          const ov    = daysOverlapInMonth(phase.start,phase.end,mk);
          result[analyst][mk] = (result[analyst][mk]||0) + pct*(ov/dim);
        });
      });
    });
  });
  Object.values(result).forEach(a=>Object.keys(a).forEach(mk=>{a[mk]=Math.round(a[mk]);}));
  return result;
}

// ─── Weekly / Daily Allocation Computation ────────────────────────────────────
function weekMonday(d) {
  const day = calSoD(d instanceof Date ? d : (parseSPDate(d)||new Date()));
  return calAddDays(day, -((day.getDay()||7)-1));
}
function weekKey(d) {
  const m=weekMonday(d instanceof Date ? d : (parseSPDate(d)||new Date()));
  return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}
function weekLabel(wk) {
  const d=parseSPDate(wk); if(!d) return wk;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function rangeWeeks(startMk, endMk) {
  const [sy,sm]=startMk.split('-').map(Number);
  const [ey,em]=endMk.split('-').map(Number);
  const endDate=new Date(ey,em,0);
  let cur=weekMonday(new Date(sy,sm-1,1));
  const wks=[]; while(cur<=endDate&&wks.length<104){ wks.push(weekKey(cur)); cur=calAddDays(cur,7); }
  return wks;
}
function dayKey(d) {
  const day=calSoD(d instanceof Date ? d : (parseSPDate(d)||new Date()));
  return `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
}
function rangeDays(startMk, endMk, maxDays=45) {
  const [sy,sm]=startMk.split('-').map(Number);
  const [ey,em]=endMk.split('-').map(Number);
  const endDate=new Date(ey,em,0);
  let cur=calSoD(new Date(sy,sm-1,1));
  const result=[]; while(cur<=endDate&&result.length<maxDays){ result.push(dayKey(cur)); cur=calAddDays(cur,1); }
  return result;
}
function computeAllocationsWeekly(projects, weeks) {
  const result={};
  projects.forEach(proj=>{
    proj.analysts.forEach((analyst,idx)=>{
      if(!analyst) return;
      if(!result[analyst]) result[analyst]={};
      PHASES.forEach(ph=>{
        const phase=proj.phases[ph.key];
        const pct=phase?.pcts?.[idx]||0;
        if(!phase?.start||!phase?.end||!pct) return;
        weeks.forEach(wk=>{
          const wkS=parseSPDate(wk), wkE=calAddDays(wkS,6);
          const phS=parseSPDate(phase.start), phE=parseSPDate(phase.end);
          if(!phS||!phE) return;
          const oS=phS>wkS?phS:wkS, oE=phE<wkE?phE:wkE;
          const ov=Math.max(0,Math.round((oE-oS)/864e5)+1);
          if(ov>0) result[analyst][wk]=(result[analyst][wk]||0)+pct*(ov/7);
        });
      });
    });
  });
  Object.values(result).forEach(a=>Object.keys(a).forEach(k=>{a[k]=Math.round(a[k]);}));
  return result;
}
function computeAllocationsDaily(projects, days) {
  const result={};
  projects.forEach(proj=>{
    proj.analysts.forEach((analyst,idx)=>{
      if(!analyst) return;
      if(!result[analyst]) result[analyst]={};

        if(!phase?.start||!phase?.end||!pct) return;
        const phS=parseSPDate(phase.start), phE=parseSPDate(phase.end);
        if(!phS||!phE) return;
        days.forEach(dk=>{
          const d=parseSPDate(dk);
          if(d>=phS&&d<=phE) result[analyst][dk]=(result[analyst][dk]||0)+pct;
        });
      });
    });
  });
  Object.values(result).forEach(a=>Object.keys(a).forEach(k=>{a[k]=Math.round(a[k]);}));
  return result;
}

// ─── Vacation Helpers ─────────────────────────────────────────────────────────
// Returns {analyst: {col: pct}} where pct is the proportional vacation % for
// that column period (100 × overlap_days / period_days).
// Day view: pct = 100 for vacation days (full day), 0 otherwise.
function buildVacationMap(vacations, cols, granularity) {
  const map={};
  (vacations||[]).forEach(v=>{
    if(!v.analyst||!v.start||!v.end) return;
    if(!map[v.analyst]) map[v.analyst]={};
    const vS=parseSPDate(v.start), vE=parseSPDate(v.end);
    if(!vS||!vE) return;
    cols.forEach(col=>{
      let pct=0;
      if (granularity==='month') {
        const [y,m]=col.split('-').map(Number);
        const dim=new Date(y,m,0).getDate();
        const ov=daysOverlapInMonth(v.start,v.end,col);
        if(ov>0) pct=Math.round(100*(ov/dim));
      } else if (granularity==='week') {
        const wS=parseSPDate(col), wE=calAddDays(wS,6);
        const oS=vS>wS?vS:wS, oE=vE<wE?vE:wE;
        const ov=Math.max(0,Math.round((oE-oS)/864e5)+1);
        if(ov>0) pct=Math.round(100*(ov/7));
      } else {
        const d=parseSPDate(col);
        if(d&&d>=vS&&d<=vE) pct=100;
      }
      if(pct>0) map[v.analyst][col]=(map[v.analyst][col]||0)+pct;
    });
  });
  // Cap at 100 per column
  Object.values(map).forEach(a=>Object.keys(a).forEach(k=>{a[k]=Math.min(a[k],100);}));
  return map;
}

  }

const MOSKIT_SP_SCOPE  = 'https://ciadetalentos.sharepoint.com/.default';

const MOSKIT_FILE_REL  = "/sites/Public/Documentos Partilhados/Desenvolvimento de Neg\u00f3cios/0 Back Office - DN/Relat\u00f3rio de Vendas/Base_Moskit.csv";
const MOSKIT_COLS = [

async function acquireTokenForResource(clientId, tenantId, scope) {
  const app = getMsalApp(clientId, tenantId);
  await app.initialize();
  const accounts = app.getAllAccounts();
  if (!accounts.length) throw new Error('Não autenticado');
  try {
    const res = await app.acquireTokenSilent({scopes:[scope], account:accounts[0]});

  } catch {

}
async function fetchMoskitCSV(clientId, tenantId) {
  const token = await acquireTokenForResource(clientId, tenantId, MOSKIT_SP_SCOPE);
  const safeRel = MOSKIT_FILE_REL.replace(/'/g,"''");
  const url = `${MOSKIT_SITE_URL}/_api/web/GetFileByServerRelativeUrl('${safeRel}')/$value`;
  const res = await fetch(url, {headers:{'Authorization':`Bearer ${token}`}});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buffer = await res.arrayBuffer();
  // Try UTF-8 first; if garbled characters detected, fall back to Windows-1252
  const utf8 = new TextDecoder('utf-8').decode(buffer);
  if (utf8.includes('\uFFFD')) return new TextDecoder('windows-1252').decode(buffer);
  return utf8;
}

async function spFetch(token, url, opts={}) {
  const res = await fetch(url, {
    ...opts,
    headers:{
      'Authorization':`Bearer ${token}`,
      'Accept':'application/json;odata=nometadata',
      ...(opts.headers||{}),
    },
  });
  if (!res.ok) { const t=await res.text().catch(()=>''); throw new Error(`SP ${res.status}: ${t.slice(0,200)}`); }
  if (res.status===204) return null;
  return res.json();
}
function _spListBase(siteUrl, listName) {
  // Use GetList with server-relative URL — more reliable than GetByTitle
  const rel = new URL(siteUrl).pathname.replace(/\/$/, '');
  return `${siteUrl}/_api/web/GetList('${rel}/Lists/${listName}')`;
}
async function fetchSPList(token, siteUrl, listName) {
  // Usa $select com apenas os campos base — igual ao original que funcionava.
  // Campos Pulse são carregados individualmente por fetchSPItemFull ao editar.
  const base = _spListBase(siteUrl, listName);
  const sel  = [
    'Id','indice','Cliente','Status_Programa','Nome_Programa','Ciclo_Orcamentario','Title',
    'KA',...HEAD_KEYS,...ANALYST_KEYS,
    ...PHASES.flatMap(ph=>[`Inicio_${ph.key}`,`Fim_${ph.key}`,`Analista_${ph.key}_PCT`]),
  ].join(',');
  let items=[], url=`${base}/items?$select=${encodeURIComponent(sel)}&$top=200`;
  while (url) {
    const json = await spFetch(token, url);
    items = items.concat(json.value||[]);
    url = json['@odata.nextLink']||null;
  }
  return items;
}

// Retorna o nível de acesso do usuário logado (coluna Acesso na List_Pulse_Equipe).
// 1 ou 2 → acesso completo (Gestão + Pulse). 3+ → somente Pulse. 99 = não encontrado/erro.
// Busca sem $select para evitar problemas com nomes internos de coluna no SP.
async function fetchUserAccess(token, siteUrl, email) {
  try {
    const base       = _spListBase(siteUrl, SP_TEAM_LIST);
    const lowerEmail = (email||'').toLowerCase().trim();
    // Sem $select — retorna todos os campos, evita erros com nomes internos diferentes
    const json  = await spFetch(token, `${base}/items?$top=500`);
    const items = json.value||[];
    // Procura o item onde QUALQUER campo string contenha o e-mail do usuário
    const item  = items.find(i=>
      Object.values(i).some(v=> typeof v==='string' && v.toLowerCase().trim()===lowerEmail)
    );
    if (!item) return 99;
    // Tenta variações comuns do nome interno da coluna Acesso
    const raw = item['Acesso'] ?? item['acesso'] ?? item['Acesso0'] ?? item['N_x00famero'] ?? null;
    if (raw===null||raw===undefined) return 99;
    const val = parseInt(raw);
    return isNaN(val) ? 99 : val;
  } catch { return 99; }

  await spFetch(token, `${_spListBase(siteUrl,listName)}/items(${spId})`, {
    method:'POST',
    headers:{'Content-Type':'application/json;odata=nometadata','X-HTTP-Method':'MERGE','If-Match':'*'},
    body:JSON.stringify(payload),
  });
}
async function createSPItem(token, siteUrl, listName, payload) {
  const res = await fetch(`${_spListBase(siteUrl,listName)}/items`, {
    method:'POST',
    headers:{
      'Authorization':`Bearer ${token}`,
      'Accept':'application/json;odata=nometadata',
      'Content-Type':'application/json;odata=nometadata',
    },
    body:JSON.stringify(payload),
  });
  if (!res.ok) { const t=await res.text().catch(()=>''); throw new Error(`SP Create ${res.status}: ${t.slice(0,200)}`); }
  return res.json();
}

// ─── Dist data stored as attachment on a hidden List_Pulse item ───────────────
// Item Title='__alocacao_dist__' acts as a container; JSON stored as attachment.
// No field-length limits, no new columns, no Documents folder needed.
const DIST_MARKER   = '__alocacao_dist__';
const DIST_ATT_NAME = 'dist.json';
async function _getOrCreateDistItem(token, siteUrl) {
  const base   = _spListBase(siteUrl, SP_LIST_NAME);
  const chkUrl = `${base}/items?$select=Id&$filter=Title eq '${DIST_MARKER}'&$top=1`;
  const chkRes = await fetch(chkUrl, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'} });
  if (!chkRes.ok) throw new Error(`Erro ao buscar dist item: ${chkRes.status}`);
  const existing = ((await chkRes.json()).value||[])[0];
  if (existing) return existing.Id;
  // Create marker item
  const postRes = await fetch(`${base}/items`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata','Content-Type':'application/json;odata=nometadata'},
    body: JSON.stringify({ Title: DIST_MARKER }),
  });
  if (!postRes.ok) { const t=await postRes.text().catch(()=>''); throw new Error(`Erro ao criar dist item: ${postRes.status} ${t.slice(0,100)}`); }
  return (await postRes.json()).Id;
}
async function fetchDistFile(token, siteUrl) {
  try {
    const base   = _spListBase(siteUrl, SP_LIST_NAME);
    const chkUrl = `${base}/items?$select=Id&$filter=Title eq '${DIST_MARKER}'&$top=1`;
    const chkRes = await fetch(chkUrl, { headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'} });
    if (!chkRes.ok) return {distributions:{},localProjects:[]};
    const item = ((await chkRes.json()).value||[])[0];
    if (!item) return {distributions:{},localProjects:[]};
    const attRes = await fetch(`${base}/items(${item.Id})/AttachmentFiles('${DIST_ATT_NAME}')/$value`, {
      headers:{'Authorization':`Bearer ${token}`,'Accept':'text/plain'},
    });
    if (!attRes.ok) return {distributions:{},localProjects:[]};
    return JSON.parse(await attRes.text());
  } catch { return {distributions:{},localProjects:[]}; }
}
async function saveDistFile(token, siteUrl, data) {
  const base   = _spListBase(siteUrl, SP_LIST_NAME);
  const itemId = await _getOrCreateDistItem(token, siteUrl);
  const body   = new TextEncoder().encode(JSON.stringify(data));
  // Delete existing attachment first (ignore errors — might not exist yet)
  await fetch(`${base}/items(${itemId})/AttachmentFiles('${DIST_ATT_NAME}')`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'X-HTTP-Method':'DELETE','If-Match':'*'},
  }).catch(()=>{});
  // Upload new attachment
  const upRes = await fetch(`${base}/items(${itemId})/AttachmentFiles/add(FileName='${DIST_ATT_NAME}')`, {
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/octet-stream'},
    body,
  });
  if (!upRes.ok) { const t=await upRes.text().catch(()=>''); throw new Error(`Erro ao salvar dist: ${upRes.status} ${t.slice(0,150)}`); }
}
// Merge SP items + distribution file → complete project list
function mergeProjectsWithDist(spItems, dist) {
  const spProjects = spItems
    .filter(item=>item.Title!==DIST_MARKER)
    .map(item=>{
    const proj = parseSPItem(item);
    const projHeadNames = _projHeads(proj);

    // Restore analyst per-phase pcts from dist.json
    const saved = dist.distributions?.[String(proj.spId)];
    const phases={};
    PHASES.forEach(ph=>{
      const base       = proj.phases[ph.key];
      const storedPcts = saved?.[ph.key];
      phases[ph.key]   = {
        ...base,
        pcts: storedPcts&&storedPcts.length===proj.analysts.length ? storedPcts : base.pcts,
      };
    });

    // Restore head per-phase pcts from dist.json (headDistributions)
    const savedHead = dist.headDistributions?.[String(proj.spId)];
    const headPhases={};
    PHASES.forEach(ph=>{
      const base       = proj.headPhases[ph.key];
      const storedPcts = savedHead?.[ph.key];
      headPhases[ph.key] = {
        ...base,
        pcts: storedPcts&&storedPcts.length===projHeadNames.length ? storedPcts : base.pcts,
      };
    });

    return {...proj, phases, headPhases};
  });
  return [...spProjects, ...(dist.localProjects||[])];
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const local = loadLocal();
  const [projects,   setProjects]   = useState([]);
  const [authState,  setAuthState]  = useState({isAuth:false,user:'',token:''});
  const [clientId,   setClientId]   = useState(APP_CONFIG.clientId||local.clientId||'');
  const [tenantId,   setTenantId]   = useState(APP_CONFIG.tenantId||local.tenantId||'common');
  const [loading,    setLoading]    = useState(false);
  const [saving,     setSaving]     = useState(false);
  const [error,      setError]      = useState('');
  const [saveMsg,    setSaveMsg]    = useState(null);
  const [view,       setView]       = useState('dashboard');
  const [monthRange, setMonthRange] = useState(()=>{
    const n=new Date();
    const s=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
    const e=new Date(n.getFullYear()+1,n.getMonth(),1);
    return {start:s, end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};
  });
  const [distData,         setDistData]         = useState({distributions:{},localProjects:[]});
  const [teamMembers,      setTeamMembers]      = useState([]);
  const [cicloFilter,      setCicloFilter]      = useState('');
  const [showEdit,         setShowEdit]         = useState(null);   // project obj or 'new'
  const [showAnalystDetail,setShowAnalystDetail] = useState(null);
  const [module,           setModule]           = useState(null);   // null=home | 'gestao' | 'pulse'
  const [accessLevel,      setAccessLevel]      = useState(null);   // 1|2=full 3+=pulse-only 99=não encontrado
  const [extraAllocations, setExtraAllocations] = useState([]);
  const [vacations,        setVacations]        = useState([]);
  const [headMembers,      setHeadMembers]      = useState([]);
  const [entityView,       setEntityView]       = useState('analyst'); // 'analyst' | 'head'

  // Only persist config locally when it wasn't baked into APP_CONFIG
  useEffect(()=>{ if (!APP_CONFIG.clientId) saveLocal({clientId,tenantId}); },[clientId,tenantId]);

  // Se módulo 'gestao' for acessado sem permissão, redireciona para home
  useEffect(()=>{
    if (module==='gestao' && accessLevel!==null && accessLevel>=3) setModule(null);
  },[module, accessLevel]);

  const ciclos          = useMemo(()=>[...new Set(projects.map(p=>p.ciclo).filter(Boolean))].sort(),[projects]);
  const filteredProjects= useMemo(()=>cicloFilter ? projects.filter(p=>p.ciclo===cicloFilter) : projects,[projects,cicloFilter]);
  const allocations     = useMemo(()=>computeAllocations(filteredProjects),[filteredProjects]);
  const headAllocations = useMemo(()=>computeHeadAllocations(filteredProjects),[filteredProjects]);
  // Analyst list: SP team (Analistas) or fallback from allocation keys
  const analysts        = useMemo(()=>{
    if (teamMembers.length>0) return teamMembers;
    return Object.keys(allocations).sort();
  },[teamMembers, allocations]);
  // Head list: SP team (Consultores) or fallback from project head fields
  const heads           = useMemo(()=>{
    if (headMembers.length>0) return headMembers;
    const set=new Set();
    filteredProjects.forEach(p=>_projHeads(p).forEach(h=>set.add(h)));
    return [...set].sort();
  },[headMembers, filteredProjects]);
  const months          = useMemo(()=>rangeMonths(monthRange.start,monthRange.end),[monthRange]);

  // ── Load all data: SP items + dist file → merged projects ──
  const loadAll = useCallback(async(token)=>{
    setLoading(true); setError('');
    try {
      const [spItems, dist, team, hteam] = await Promise.all([
        fetchSPList(token, SP_SITE_URL, SP_LIST_NAME),
        fetchDistFile(token, SP_SITE_URL),
        fetchTeamMembers(token, SP_SITE_URL),
        fetchHeadMembers(token, SP_SITE_URL),
      ]);
      setDistData(dist);
      setTeamMembers(team);
      setHeadMembers(hteam);
      setProjects(mergeProjectsWithDist(spItems, dist));
      setExtraAllocations(dist.extraAllocations||[]);  // shared via dist.json in SP
      setVacations(dist.vacations||[]);               // shared via dist.json in SP
    } catch(e) {
      // Diagnostic: try to list all visible lists to find correct name
      let diagMsg = 'Erro ao carregar dados: '+e.message;
      try {
        const diagUrl = `${SP_SITE_URL}/_api/web/lists?$select=Title,Hidden,RootFolder/ServerRelativeUrl&$expand=RootFolder&$top=100`;
        const diagRes = await fetch(diagUrl, {headers:{'Authorization':`Bearer ${token}`,'Accept':'application/json;odata=nometadata'}});
        if (diagRes.ok) {
          const diagJson = await diagRes.json();
          const names = (diagJson.value||[]).map(l=>`"${l.Title}"${l.Hidden?'[oculta]':''} (${l.RootFolder?.ServerRelativeUrl||''})`).join(' | ');
          diagMsg += `\n\n📋 Listas encontradas no site:\n${names||'(nenhuma)'}`;
        } else {
          diagMsg += `\n\n⚠️ Sem acesso ao site (${diagRes.status}). Verifique permissões do app no Azure AD (AllSites.Read).`;
        }
      } catch(diagE) { diagMsg += '\n\n⚠️ Diagnóstico falhou: '+diagE.message; }
      setError(diagMsg);
    }
    finally { setLoading(false); }
  },[]);

  // ── Save extra allocations / vacations to the shared dist.json in SharePoint ──
  const saveExtraAllocs = useCallback(async(newExtras)=>{
    setExtraAllocations(newExtras);
    const newDist = {...distData, extraAllocations: newExtras};
    setDistData(newDist);
    await saveDistFile(authState.token, SP_SITE_URL, newDist);
  },[authState.token, distData]);

  const saveVacations = useCallback(async(newVacs)=>{
    setVacations(newVacs);
    const newDist = {...distData, vacations: newVacs};
    setDistData(newDist);
    await saveDistFile(authState.token, SP_SITE_URL, newDist);
  },[authState.token, distData]);

  const signInAndFetch = useCallback(async()=>{
    if (!clientId) { setError('⚙️ Client ID não configurado. Edite APP_CONFIG no início do arquivo.'); return; }
    setLoading(true); setError('');
    try {
      const {token,user,email} = await acquireToken(clientId,tenantId);
      // Busca nível de acesso ANTES de mostrar a home (evita flash do cartão Gestão)
      const access = await fetchUserAccess(token, SP_SITE_URL, email);
      setAuthState({isAuth:true,user,token,email});
      setAccessLevel(access);
      await loadAll(token);
    } catch(e) { setError('Erro: '+e.message); }
    finally { setLoading(false); }
  },[clientId,tenantId,loadAll]);

  const signOut = useCallback(async()=>{
    await signOutMsal(clientId,tenantId);
    setAuthState({isAuth:false,user:'',token:''});
    setProjects([]);
    setDistData({distributions:{},localProjects:[]});
  },[clientId,tenantId]);

  // ── Save Project ──
  // SP projects:    PATCH/POST List_Pulse  +  update distributions in dist file
  // Local projects: save full project obj in dist file (shared via SP, no new SP columns)
  const saveProject = useCallback(async(project)=>{
    if (!authState.isAuth || !authState.token) {
      // No auth: session-only (warn user)
      if (project.spId) {
        setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
      } else {
        setProjects(prev=>[...prev, {...project, id:'local_'+Date.now(), source:'local'}]);
      }
      setSaveMsg({type:'warn',text:'⚠️ Salvo localmente nesta sessão. Conecte ao SharePoint para compartilhar.'});
      setShowEdit(null);
      setTimeout(()=>setSaveMsg(null),7000);
      return;
    }

    setSaving(true); setSaveMsg(null);
    try {
      // Work on a mutable copy of distData
      const newDist = {
        distributions: {...(distData.distributions||{})},
        localProjects:  [...(distData.localProjects||[])],
      };

      if (project.source==='sharepoint') {
        // ── SP project ──
        const payload = buildSPPayload(project);
        if (project.spId) {
          await patchSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, project.spId, payload);
          setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
        } else {
          const maxIndice = projects
            .filter(p=>p.source==='sharepoint')
            .map(p=>Number(p.indice)||0)
            .reduce((a,b)=>Math.max(a,b), 0);
          const fullPayload = {
            ...payload,
            Title:project.title, Nome_Programa:project.title,
            Cliente:project.client||'', Status_Programa:project.status||'',
            indice: maxIndice + 1,
          };
          const created = await createSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, fullPayload);
          const newId   = created.Id||created.id;
          const saved   = {...project, spId:newId, id:String(newId), source:'sharepoint'};
          setProjects(prev=>[...prev, saved]);
          project = saved; // update reference for dist save below
        }
        // Save per-analyst distribution for this SP project
        const dist={};
        PHASES.forEach(ph=>{ dist[ph.key]=project.phases[ph.key]?.pcts||[]; });
        newDist.distributions[String(project.spId)] = dist;
        setSaveMsg({type:'success', text:'✓ Salvo no SharePoint.'});

      } else {
        // ── Local / tool-only project → stored entirely in dist file ──
        const finalId = project.id?.startsWith('proj_')||project.id?.startsWith('local_')
          ? project.id : 'local_'+Date.now();
        const localProj = {...project, id:finalId, spId:null, source:'local'};
        const idx = newDist.localProjects.findIndex(p=>p.id===localProj.id);
        if (idx>=0) {
          newDist.localProjects[idx] = localProj;
          setProjects(prev=>prev.map(p=>p.id===localProj.id ? localProj : p));
        } else {
          newDist.localProjects.push(localProj);
          setProjects(prev=>[...prev, localProj]);
        }
        setSaveMsg({type:'success', text:'✓ Projeto salvo na ferramenta (visível para todos).'});
      }

      // Write updated dist file to SharePoint
      await saveDistFile(authState.token, SP_SITE_URL, newDist);
      setDistData(newDist);

    } catch(e) {
      setSaveMsg({type:'error', text:'Erro ao salvar: '+e.message});
    } finally {
      setSaving(false);
      setShowEdit(null);
      setTimeout(()=>setSaveMsg(null),5000);
    }
  },[authState, distData]);

  // ── Save Pulse (full-field PATCH from PulseView) ──
  const savePulse = useCallback(async(project)=>{
    if (!authState.isAuth || !project.spId) return;
    setSaving(true); setSaveMsg(null);
    try {
      const payload = {
        Nome_Programa:      project.title||null,
        Cliente:            project.client||null,
        Status_Programa:    project.status||null,
        Ciclo_Orcamentario: project.ciclo||null,
        KA:                 project.ka||null,
        Head_1:             project.head1||null,
        Head_2:             project.head2||null,
        Head_3:             project.head3||null,
      };
      // Pulse extra fields — date fields converted back to SP ISO format
      if (project.pulseData) {
        PULSE_FIELDS.forEach(f=>{
          const v = project.pulseData[f.k];
          payload[f.k] = (f.t==='date') ? (v ? fmtDateForSP(v) : null) : (v||null);
        });
      }
      for (let i=0; i<MAX_ANALYSTS; i++) {
        payload[`Analista_${i+1}`] = project.analysts[i]||null;
      }
      PHASES.forEach(ph=>{
        const phase     = project.phases[ph.key]||{};
        const headPhase = project.headPhases?.[ph.key]||{};
        const total     = totalPhasePct(phase);
        const headTotal = totalPhasePct(headPhase);
        payload[`Inicio_${ph.key}`]       = phase.start ? fmtDateForSP(phase.start) : null;
        payload[`Fim_${ph.key}`]          = phase.end   ? fmtDateForSP(phase.end)   : null;
        payload[`Analista_${ph.key}_PCT`] = pctToSP(total);
        const headCol = HEAD_PCT_COLS[ph.key];
        if (headCol) payload[headCol]     = pctToSP(headTotal);
      });
      await patchSPItem(authState.token, SP_SITE_URL, SP_LIST_NAME, project.spId, payload);
      // Update per-analyst + per-head distributions in dist file
      const newDist = {
        ...distData,
        distributions:     {...(distData.distributions||{})},
        headDistributions: {...(distData.headDistributions||{})},
        localProjects:     [...(distData.localProjects||[])],
      };
      const distEntry={};
      PHASES.forEach(ph=>{ distEntry[ph.key]=project.phases[ph.key]?.pcts||[]; });
      newDist.distributions[String(project.spId)] = distEntry;
      const headDistEntry={};
      PHASES.forEach(ph=>{ headDistEntry[ph.key]=project.headPhases?.[ph.key]?.pcts||[]; });
      newDist.headDistributions[String(project.spId)] = headDistEntry;
      await saveDistFile(authState.token, SP_SITE_URL, newDist);
      setDistData(newDist);
      setProjects(prev=>prev.map(p=>p.id===project.id ? {...project} : p));
      setSaveMsg({type:'success', text:'✓ Salvo no SharePoint.'});
    } catch(e) {
      setSaveMsg({type:'error', text:'Erro ao salvar: '+e.message});
    } finally {
      setSaving(false);
      setTimeout(()=>setSaveMsg(null), 5000);
    }
  },[authState, distData]);

  // ── Suggestions ──
  function getSuggestions(proj, phKey) {
    const ph = proj.phases[phKey];
    if (!ph?.start||!ph?.end) return [];
    const mths = rangeMonths(monthKey(parseSPDate(ph.start)),monthKey(parseSPDate(ph.end)));
    return analysts.filter(a=>!proj.analysts.includes(a))
      .map(a=>({analyst:a, maxAlloc:Math.max(0,...mths.map(m=>allocations[a]?.[m]||0))}))
      .map(s=>({...s, available:100-s.maxAlloc}))
      .filter(s=>s.available>0).sort((a,b)=>b.available-a.available).slice(0,5);
  }

  // ── CSV Import ──
  const importCSV = useCallback(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const text = e.target.result;
      const firstLine = text.split('\n')[0]||'';
      const delim = firstLine.split(';').length>firstLine.split(',').length?';':',';
      Papa.parse(text,{header:true,skipEmptyLines:true,delimiter:delim,
        complete:r=>{
          if (r.errors.length&&!r.data.length) { setError('Erro CSV: '+r.errors[0].message); return; }
          setProjects(r.data.map((row,i)=>parseSPItem({Id:row.Id||row.id||i+1,...row})));
          setError('');
        },
        error:e=>setError('Erro CSV: '+e.message),
      });
    };
    reader.readAsText(file,'UTF-8');
  },[]);

  // ── Not authenticated: show full-screen login ──
  if (!authState.isAuth) {
    return (
      <LoginScreen
        onSignIn={signInAndFetch}
        onImportCSV={importCSV}
        loading={loading}
        error={error}
        onClearError={()=>setError('')}
        clientId={clientId}
        setClientId={setClientId}
        tenantId={tenantId}
        setTenantId={setTenantId}
        isConfigured={!!clientId}
      />
    );
  }

  // ── Authenticated: Home screen (module selector) ──
  if (!module) {
    return (
      <HomeScreen
        onSelect={setModule}
        authState={authState}
        onSignOut={signOut}
        loading={loading}
        onRefresh={()=>loadAll(authState.token)}
        error={error}
        onClearError={()=>setError('')}
        accessLevel={accessLevel}
      />
    );
  }

  // ── Authenticated: helper (used in Gestão only) ──
  function addAnalystToProject(proj, analyst) {
    const updated={...proj,analysts:[...proj.analysts,analyst]};
    PHASES.forEach(ph=>{
      updated.phases={...updated.phases,[ph.key]:{...updated.phases[ph.key],pcts:[...(updated.phases[ph.key]?.pcts||[]),0]}};
    });
    setShowEdit(updated);
  }

  // ── Shared chrome ──
  const saveMsgBanner = saveMsg && (
    <div className={`slide-down sticky top-0 z-40 text-center py-2 text-sm font-medium ${
      saveMsg.type==='success'?'bg-emerald-600 text-white':
      saveMsg.type==='error'?'bg-red-600 text-white':'bg-amber-500 text-white'}`}>
      {saveMsg.text}
    </div>
  );
  const errorBanner = error && (
    <div className="mt-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-start gap-2 mx-4">
      <span className="flex-1 whitespace-pre-wrap">{error}</span>
      <button onClick={()=>setError('')} className="text-red-400 hover:text-red-600 shrink-0">✕</button>
    </div>
  );

  // ── Pulse module ──
  if (module==='pulse') {
    return (
      <div className="min-h-screen bg-slate-50">
        <AppHeader view={view} setView={setView} authState={authState}
          onSignOut={signOut} projectCount={projects.length} loading={loading}
          onRefresh={()=>loadAll(authState.token)} module={module} onHome={()=>setModule(null)}/>
        {saveMsgBanner}
        {errorBanner}
        <PulseView
          projects={projects}
          ciclos={ciclos}
          allAnalysts={analysts}
          onSave={savePulse}
          saving={saving}
          token={authState.token}
        />
      </div>
    );
  }

  // ── Calendar module ──
  if (module==='calendar') {
    return (
      <div className="min-h-screen bg-slate-50">
        <AppHeader view={view} setView={setView} authState={authState}
          onSignOut={signOut} projectCount={projects.length} loading={loading}
          onRefresh={()=>loadAll(authState.token)} module={module} onHome={()=>setModule(null)}/>
        {saveMsgBanner}{errorBanner}
        <CalendarView projects={projects} ciclos={ciclos}/>
      </div>
    );
  }

  // ── Gestão module ──
  // Entity-aware data: switch between Analistas and Heads
  const isHeadView   = entityView==='head';
  const activeNames  = isHeadView ? heads     : analysts;
  const activeAllocs = isHeadView ? headAllocations : allocations;

  return (
    <div className="min-h-screen bg-slate-50">
      <AppHeader view={view} setView={setView} authState={authState}
        onSignOut={signOut} projectCount={projects.length} loading={loading}
        onRefresh={()=>loadAll(authState.token)} module={module} onHome={()=>setModule(null)}
        entityView={entityView} setEntityView={setEntityView}/>

      {saveMsgBanner}

      <main className="max-w-screen-2xl mx-auto px-4 pb-10">

// ─── Month Range Picker ───────────────────────────────────────────────────────
function MonthRangePicker({monthRange,setMonthRange}) {
  const n=new Date();
  const cur=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  const shortcuts=[
    {label:'6m',fn:()=>{const e=new Date(n.getFullYear(),n.getMonth()+5,1);return{start:cur,end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};}},
    {label:'12m',fn:()=>{const e=new Date(n.getFullYear()+1,n.getMonth(),1);return{start:cur,end:`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}`};}},
    {label:'2025–26',fn:()=>({start:'2025-01',end:'2026-12'})},
  ];
  return (
    <div className="flex items-center gap-2 flex-wrap">
      <div className="flex items-center gap-1.5 bg-slate-100 rounded-lg px-2.5 py-1.5">
        <span className="text-slate-500 text-xs font-medium">Visualizando:</span>
        <input type="month" value={monthRange.start} onChange={e=>setMonthRange(p=>({...p,start:e.target.value}))}
          className="bg-transparent border-0 text-xs text-slate-700 focus:outline-none cursor-pointer"/>
        <span className="text-slate-400 text-xs">→</span>
        <input type="month" value={monthRange.end} onChange={e=>setMonthRange(p=>({...p,end:e.target.value}))}
          className="bg-transparent border-0 text-xs text-slate-700 focus:outline-none cursor-pointer"/>
      </div>
      <div className="flex gap-1">
        {shortcuts.map(s=>(
          <button key={s.label} onClick={()=>setMonthRange(s.fn())}
            className="text-xs px-2 py-1 rounded-md bg-white border border-slate-200 text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 transition">
            {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── Dashboard View ───────────────────────────────────────────────────────────
function DashboardView({analysts,allocations,months,monthRange,setMonthRange,onAnalystClick,vacations,entityView}) {
  if (analysts.length===0) return (
    <div className="mt-10 text-center text-slate-400">
      <p className="text-4xl mb-3">📊</p>
      <p className="text-lg font-medium">Nenhum dado carregado</p>
      <p className="text-sm mt-1">Conecte ao SharePoint ou importe um CSV.</p>
    </div>
  );

  // Build vacation map for months (month granularity)
  const vacMap = useMemo(()=>buildVacationMap(vacations, months, 'month'),[vacations,months]);

  return (
    <div className="fade-in mt-4 space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-lg font-bold text-slate-800">
          {entityView==='head'?'Dashboard de Alocação — Heads':'Dashboard de Alocação — Analistas'}
        </h2>
        <MonthRangePicker monthRange={monthRange} setMonthRange={setMonthRange}/>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
        {analysts.map(analyst=>{
          const vals = months.map(m=>{
            const vacPct=vacMap[analyst]?.[m]||0;
            const allocPct=allocations[analyst]?.[m]||0;
            return vacPct>0 ? Math.min(100,Math.round(vacPct+allocPct*(1-vacPct/100))) : allocPct;
          });
          const max  = Math.max(...vals,0);
          const hasVacation = months.some(m=>(vacMap[analyst]?.[m]||0)>0);
          return (
            <button key={analyst} onClick={()=>onAnalystClick(analyst)}
              className="bg-white rounded-xl border border-slate-200 p-4 text-left hover:border-indigo-300 hover:shadow-md transition group">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-semibold text-slate-800 group-hover:text-indigo-700 truncate">{analyst}</span>
                <TrafficDot pct={max} vacation={hasVacation&&max===100}/>
              </div>
              <p className={`text-2xl font-bold ${hasVacation&&max===100?'text-blue-600':max>100?'text-red-600':max>90?'text-yellow-600':'text-green-600'}`}>{max}%</p>
              <p className="text-xs text-slate-400 mt-0.5">pico no período</p>
              <div className="mt-3 flex gap-0.5">
                {months.slice(0,12).map((m,mi)=>{
                  const vacPct=vacMap[analyst]?.[m]||0;
                  const allocPct=allocations[analyst]?.[m]||0;
                  const v=vals[mi];
                  const fullVac=vacPct===100;
                  const [y,mo] = m.split('-').map(Number);
                  const abbr = new Date(y,mo-1,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
                  const color = vacPct>0?'#3b82f6':v>100?'#ef4444':v>90?'#ca8a04':v>0?'#16a34a':'#cbd5e1';
                  return (
                    <div key={m} className="flex-1 flex flex-col items-center" style={{minWidth:0}}>
                      <div className="w-full rounded-sm mb-0.5" style={{height:'5px',backgroundColor:color}}/>
                      <span className="text-slate-400 truncate w-full text-center leading-none" style={{fontSize:'9px'}}>{abbr}</span>
                      <span className="font-semibold truncate w-full text-center leading-none" style={{fontSize:'8px',color:vacPct>0?'#3b82f6':v>0?color:'transparent'}}>
                        {fullVac?'🏖':vacPct>0?`🏖${v}%`:v>0?v+'%':''}
                      </span>
                    </div>
                  );
                })}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Extra Allocations Merge ──────────────────────────────────────────────────
// Merges extra (local-only) allocations into a computed allocation map.
// granularity: 'month' (col = "YYYY-MM") | 'week' (col = "YYYY-MM-DD" Monday) | 'day' (col = "YYYY-MM-DD")
function mergeExtras(base, extras, cols, granularity) {
  if (!extras || extras.length===0) return base;
  // Deep-clone base so we don't mutate
  const result={};
  Object.entries(base).forEach(([a,vals])=>{ result[a]={...vals}; });
  extras.forEach(ea=>{
    if (!ea.analyst||!ea.start||!ea.end||!ea.pct) return;
    if (!result[ea.analyst]) result[ea.analyst]={};
    const eaS=parseSPDate(ea.start), eaE=parseSPDate(ea.end);
    if (!eaS||!eaE) return;
    cols.forEach(col=>{
      let contribution=0;
      if (granularity==='month') {
        const [y,m]=col.split('-').map(Number);
        const dim=new Date(y,m,0).getDate();
        const ov=daysOverlapInMonth(ea.start,ea.end,col);
        if(ov>0) contribution=ea.pct*(ov/dim);
      } else if (granularity==='week') {
        const wkS=parseSPDate(col), wkE=calAddDays(wkS,6);
        const oS=eaS>wkS?eaS:wkS, oE=eaE<wkE?eaE:wkE;
        const ov=Math.max(0,Math.round((oE-oS)/864e5)+1);
        if(ov>0) contribution=ea.pct*(ov/7);
      } else {
        const d=parseSPDate(col);
        if(d&&d>=eaS&&d<=eaE) contribution=ea.pct;
      }
      if(contribution>0) result[ea.analyst][col]=(result[ea.analyst][col]||0)+contribution;
    });
  });
  Object.values(result).forEach(a=>Object.keys(a).forEach(k=>{a[k]=Math.round(a[k]);}));
  return result;
}

// ─── Monthly / Weekly / Daily Grid ────────────────────────────────────────────
function MonthlyGrid({analysts,allocations,months,monthRange,setMonthRange,onAnalystClick,projects,extraAllocations,vacations,entityType}) {
  const [gridView, setGridView] = useState('month');
  const isHead = entityType==='head';

  const weeks = useMemo(()=> gridView==='week' ? rangeWeeks(monthRange.start,monthRange.end) : [], [gridView,monthRange]);
  const days  = useMemo(()=> gridView==='day'  ? rangeDays(monthRange.start,monthRange.end,45) : [], [gridView,monthRange]);

  const weekAllocs = useMemo(()=> gridView==='week'
    ? (isHead ? computeHeadAllocationsWeekly(projects||[],weeks) : computeAllocationsWeekly(projects||[],weeks))
    : {}, [gridView,isHead,projects,weeks]);
  const dayAllocs  = useMemo(()=> gridView==='day'
    ? (isHead ? computeHeadAllocationsDaily(projects||[],days) : computeAllocationsDaily(projects||[],days))
    : {}, [gridView,isHead,projects,days]);

  // Merge extra (local-only) allocations on top of computed ones
  const mergedMonth = useMemo(()=>mergeExtras(allocations,   extraAllocations, months, 'month'), [allocations,   extraAllocations, months]);
  const mergedWeek  = useMemo(()=>mergeExtras(weekAllocs,    extraAllocations, weeks,  'week'),  [weekAllocs,    extraAllocations, weeks]);
  const mergedDay   = useMemo(()=>mergeExtras(dayAllocs,     extraAllocations, days,   'day'),   [dayAllocs,     extraAllocations, days]);

  const cols   = gridView==='month' ? months : gridView==='week' ? weeks : days;
  const allocs = gridView==='month' ? mergedMonth : gridView==='week' ? mergedWeek : mergedDay;
  const vacMap = useMemo(()=>buildVacationMap(vacations, cols, gridView),[vacations,cols,gridView]);

  const DAY_ABR = ['D','S','T','Q','Q','S','S'];
  function colHeader(col) {
    if (gridView==='month') return <span className="whitespace-nowrap">{monthLabel(col)}</span>;
    if (gridView==='week')  return <span className="whitespace-nowrap">{weekLabel(col)}</span>;
    const d=parseSPDate(col);
    const isToday=d&&calSameDay(d,new Date());
    return (
      <span className={`flex flex-col items-center leading-tight gap-0.5 ${isToday?'text-indigo-600 font-bold':''}`}>
        <span>{String(d.getDate()).padStart(2,'0')}</span>
        <span className="text-xs font-normal opacity-50">{DAY_ABR[d.getDay()]}</span>
      </span>
    );
  }

  const minColW = gridView==='day' ? 'min-w-[38px]' : gridView==='week' ? 'min-w-[58px]' : 'min-w-[64px]';

  if (analysts.length===0) return (
    <div className="mt-10 text-center text-slate-400">
      <p className="text-4xl mb-3">📅</p>
      <p className="text-lg font-medium">Nenhum dado carregado</p>
      <p className="text-sm mt-1">Conecte ao SharePoint ou importe um CSV.</p>
    </div>
  );

  return (
    <div className="fade-in mt-4 space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h2 className="text-lg font-bold text-slate-800">
          {isHead?'Grade de Alocação — Heads':'Grade de Alocação — Analistas'}
        </h2>
        <div className="flex items-center gap-2 flex-wrap">
          {/* View switcher */}
          <div className="flex bg-slate-100 rounded-lg p-0.5 gap-0.5">
            {['month','week','day'].map(v=>(
              <button key={v} onClick={()=>setGridView(v)}
                className={`px-3 py-1.5 rounded-md text-xs font-medium transition ${gridView===v?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>
                {v==='month'?'Mês':v==='week'?'Semana':'Dia'}
              </button>
            ))}
          </div>
          <MonthRangePicker monthRange={monthRange} setMonthRange={setMonthRange}/>
        </div>
      </div>

      {gridView==='day'&&days.length>=45&&(
        <p className="text-xs text-amber-600 bg-amber-50 border border-amber-100 px-3 py-1.5 rounded-lg inline-block">
          ⚠️ Mostrando os primeiros 45 dias do período. Reduza o intervalo para ver mais precisão.
        </p>
      )}

      <div className="scroll-table bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="min-w-full text-sm border-collapse">
          <thead>
            <tr className="bg-slate-50 border-b border-slate-200">
              <th className="sticky left-0 bg-slate-50 px-4 py-3 text-left text-xs font-semibold text-slate-600 min-w-40 z-20">Analista</th>
              {cols.map(col=>(
                <th key={col} className={`px-1 py-2 text-center text-xs font-medium text-slate-500 ${minColW}`}>
                  {colHeader(col)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {analysts.map(analyst=>(
              <tr key={analyst} className="hover:bg-slate-50 transition">
                <td className="sticky left-0 bg-white hover:bg-slate-50 px-4 py-2.5 font-medium text-slate-800">
                  <button onClick={()=>onAnalystClick(analyst)} className="hover:text-indigo-600 transition text-left w-full truncate">
                    {analyst}
                  </button>
                </td>
                {cols.map(col=>{
                  const vacPct=vacMap[analyst]?.[col]||0;
                  const allocPct=allocs[analyst]?.[col]||0;
                  // Combine: vacation days block 100%, non-vacation days have normal alloc
                  // vacPct is already proportional (e.g. 33 = 10/30 days vacation)
                  // For remaining fraction: allocPct × (1 - vacPct/100)
                  const combined = vacPct>0
                    ? Math.min(100, Math.round(vacPct + allocPct*(1-vacPct/100)))
                    : allocPct;
                  const fullVac = vacPct===100;
                  if (vacPct>0) return (
                    <td key={col}
                      className="px-0.5 py-1.5 text-center text-xs font-semibold bg-blue-100 text-blue-700 select-none"
                      title={fullVac?'Férias':`Férias parcial (${vacPct}% do período)`}>
                      {fullVac?'🏖':`🏖 ${combined}%`}
                    </td>
                  );
                  return (
                    <td key={col} className={`px-0.5 py-2 text-center text-xs font-semibold ${cellClass(combined)}`}>
                      {combined>0?combined+'%':''}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="flex items-center gap-4 text-xs text-slate-500 flex-wrap">
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-green-200 inline-block"/>≤90%</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-yellow-200 inline-block"/>90–100%</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-red-200 inline-block"/>&gt;100%</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-blue-200 inline-block"/>🏖 Férias</span>
      </div>
    </div>
  );
}

// ─── Project Modal (redesigned — per-analyst % per phase) ─────────────────────
function ProjectModal({project, allAnalysts, allHeads, onSave, onClose, saving, isSpConnected, clientId, tenantId}) {
  const isExistingSP = !!(project?.spId);
  const isExistingLocal = project && !project?.spId;
  const [syncToSP, setSyncToSP] = useState(isExistingSP ? true : (isSpConnected && !isExistingLocal));

  const [showMoskit, setShowMoskit] = useState(false);
  const [title,    setTitle]    = useState(project?.title||'');
  const [client,   setClient]   = useState(project?.client||'');
  const [status,   setStatus]   = useState(project?.status||'');
  const [ciclo,    setCiclo]    = useState(project?.ciclo||'');

  // ── Analysts state ──
  const [analysts, setAnalysts] = useState(project?.analysts ? [...project.analysts] : []);
  const [phases,   setPhases]   = useState(()=>{
    const p={};
    PHASES.forEach(ph=>{
      const ex = project?.phases?.[ph.key];
      p[ph.key] = { start:fmtDateForInput(ex?.start)||'', end:fmtDateForInput(ex?.end)||'', pcts:ex?.pcts?[...ex.pcts]:[] };
    });
    return p;
  });

  function syncPctsLength(newList, prevPhases) {
    const updated={};
    PHASES.forEach(ph=>{
      const cur=prevPhases[ph.key].pcts||[];
      updated[ph.key]={...prevPhases[ph.key], pcts:newList.map((_,i)=>cur[i]||0)};
    });
    return updated;
  }
  function addAnalyst() { const n=[...analysts,'']; setAnalysts(n); setPhases(p=>syncPctsLength(n,p)); }
  function removeAnalyst(idx) {
    const n=analysts.filter((_,i)=>i!==idx); setAnalysts(n);
    setPhases(prev=>{ const u={}; PHASES.forEach(ph=>{ const pc=[...prev[ph.key].pcts]; pc.splice(idx,1); u[ph.key]={...prev[ph.key],pcts:pc}; }); return u; });
  }
  function updateAnalystName(idx,name) { setAnalysts(prev=>prev.map((a,i)=>i===idx?name:a)); }
  function updatePhaseField(phKey,field,val) { setPhases(prev=>({...prev,[phKey]:{...prev[phKey],[field]:val}})); }
  function updatePct(phKey,idx,val) {
    setPhases(prev=>{ const pc=[...prev[phKey].pcts]; pc[idx]=Math.max(0,parseFloat(val)||0); return {...prev,[phKey]:{...prev[phKey],pcts:pc}}; });
  }

  // ── Heads state (identical pattern, max 3) ──
  const [heads,      setHeads]      = useState(()=>{
    const h=[];
    if (project?.head1?.trim()) h.push(project.head1.trim());
    if (project?.head2?.trim()) h.push(project.head2.trim());
    if (project?.head3?.trim()) h.push(project.head3.trim());
    return h;
  });
  const [headPhases, setHeadPhases] = useState(()=>{
    const p={};
    PHASES.forEach(ph=>{
      const ex=project?.headPhases?.[ph.key];
      p[ph.key]={ pcts: ex?.pcts ? [...ex.pcts] : [] };
    });
    return p;
  });

  function syncHeadPctsLength(newList, prevHP) {
    const u={};
    PHASES.forEach(ph=>{ const cur=prevHP[ph.key].pcts||[]; u[ph.key]={ pcts:newList.map((_,i)=>cur[i]||0) }; });
    return u;
  }
  function addHead() {
    if (heads.length>=3) return;
    const n=[...heads,'']; setHeads(n); setHeadPhases(p=>syncHeadPctsLength(n,p));
  }
  function removeHead(idx) {
    const n=heads.filter((_,i)=>i!==idx); setHeads(n);
    setHeadPhases(prev=>{ const u={}; PHASES.forEach(ph=>{ const pc=[...prev[ph.key].pcts]; pc.splice(idx,1); u[ph.key]={pcts:pc}; }); return u; });
  }
  function updateHeadName(idx,name) { setHeads(prev=>prev.map((h,i)=>i===idx?name:h)); }
  function updateHeadPct(phKey,idx,val) {
    setHeadPhases(prev=>{ const pc=[...prev[phKey].pcts]; pc[idx]=Math.max(0,parseFloat(val)||0); return {...prev,[phKey]:{pcts:pc}}; });
  }

  function handleSave() {
    if (!title.trim()) return;
    const filteredA = analysts.filter(a=>a.trim());
    const filteredH = heads.filter(h=>h.trim());
    const filteredPhases={};
    PHASES.forEach(ph=>{
      const pcts=analysts.map((a,i)=>a.trim()?phases[ph.key].pcts[i]||0:null).filter(p=>p!==null);
      filteredPhases[ph.key]={...phases[ph.key], pcts};
    });
    const filteredHeadPhases={};
    PHASES.forEach(ph=>{
      const pcts=heads.map((h,i)=>h.trim()?headPhases[ph.key].pcts[i]||0:null).filter(p=>p!==null);
      filteredHeadPhases[ph.key]={ start:phases[ph.key].start, end:phases[ph.key].end, pcts };
    });
    const source = isExistingSP ? 'sharepoint' : (syncToSP&&isSpConnected ? 'sharepoint' : 'local');
    onSave({
      id:         project?.id||'proj_'+Date.now(),
      spId:       project?.spId||null,
      title:      title.trim(),
      client:     client.trim(),
      status,
      ciclo:      ciclo.trim(),
      source,
      analysts:   filteredA,
      phases:     filteredPhases,
      head1:      filteredH[0]||null,
      head2:      filteredH[1]||null,
      head3:      filteredH[2]||null,
      headPhases: filteredHeadPhases,
    });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[92vh] flex flex-col mx-4"
        onClick={e=>e.stopPropagation()}>

        {/* Sticky header */}
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0 rounded-t-2xl">
          <div>
            <h2 className="text-lg font-bold text-slate-800">{project?'Editar Projeto':'Novo Projeto'}</h2>
            <p className="text-xs text-slate-400 mt-0.5">
              {isExistingSP ? '📋 Projeto do SharePoint — alterações sincronizam automaticamente'
               : isExistingLocal ? '🗂️ Projeto da ferramenta — salvo no arquivo compartilhado'
               : isSpConnected ? 'Novo projeto' : '⚠️ Sem conexão — salvo apenas nesta sessão'}
            </p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">✕</button>
        </div>

        {/* Scrollable body */}
        <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6">

          {/* ── Informações Gerais ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Informações Gerais</h3>
              {!project&&(
                <button type="button" onClick={()=>setShowMoskit(true)}
                  className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition flex items-center gap-1">
                  🔍 Buscar no Moskit
                </button>
              )}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div className="sm:col-span-2">
                <label className="block text-xs font-medium text-slate-600 mb-1">Nome do Programa *</label>
                <input value={title} onChange={e=>setTitle(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"
                  placeholder="Ex: BASF — Trainee 2026"/>
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-600 mb-1">Cliente</label>
                <input value={client} onChange={e=>setClient(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"/>
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-600 mb-1">Status</label>
                <select value={status} onChange={e=>setStatus(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200">
                  <option value="">—</option>
                  <option value="Em andamento">Em andamento</option>
                  <option value="Concluído">Concluído</option>
                  <option value="Cancelado">Cancelado</option>
                  <option value="Planejamento">Planejamento</option>
                </select>
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs font-medium text-slate-600 mb-1">Ciclo Orçamentário</label>
                <input value={ciclo} onChange={e=>setCiclo(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-200"
                  placeholder="Ex: 2026"/>
              </div>
            </div>
          </section>
          {showMoskit&&(
            <MoskitPickerModal clientId={clientId} tenantId={tenantId}
              onClose={()=>setShowMoskit(false)}
              onSelect={row=>{
                setTitle(row['Nome']||'');
                setCiclo(row['Ciclo Or\u00e7ament\u00e1rio']||'');
                setShowMoskit(false);
              }}/>
          )}

          {/* ── Analistas ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Analistas Alocados</h3>
              <button onClick={addAnalyst}
                className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold border border-indigo-200 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition">
                + Adicionar Analista
              </button>
            </div>
            {analysts.length===0?(
              <p className="text-slate-400 text-sm italic py-2">Nenhum analista adicionado. Use o botão acima.</p>
            ):(
              <div className="space-y-2">
                {analysts.map((a,idx)=>(
                  <div key={idx} className="flex items-center gap-2">
                    <span className="text-xs text-slate-400 w-24 shrink-0">Analista {idx+1}</span>
                    <input value={a} onChange={e=>updateAnalystName(idx,e.target.value)}
                      list="analystDatalist"
                      className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-200"
                      placeholder="Nome do analista"/>
                    <button onClick={()=>removeAnalyst(idx)}
                      className="w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition text-lg leading-none shrink-0">
                      ×
                    </button>
                  </div>
                ))}
              </div>
            )}
            <datalist id="analystDatalist">
              {allAnalysts.map(a=><option key={a} value={a}/>)}
            </datalist>
          </section>

          {/* ── Heads ── */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Heads Alocados</h3>
              <button onClick={addHead} disabled={heads.length>=3}
                className="text-xs text-violet-600 hover:text-violet-800 font-semibold border border-violet-200 px-2.5 py-1 rounded-lg hover:bg-violet-50 transition disabled:opacity-40">
                + Adicionar Head
              </button>
            </div>
            {heads.length===0?(
              <p className="text-slate-400 text-sm italic py-2">Nenhum head adicionado. Use o botão acima (máx. 3).</p>
            ):(
              <div className="space-y-2">
                {heads.map((h,idx)=>(
                  <div key={idx} className="flex items-center gap-2">
                    <span className="text-xs text-slate-400 w-24 shrink-0">Head {idx+1}</span>
                    <input value={h} onChange={e=>updateHeadName(idx,e.target.value)}
                      list="headDatalist"
                      className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-violet-200"
                      placeholder="Nome do head"/>
                    <button onClick={()=>removeHead(idx)}
                      className="w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition text-lg leading-none shrink-0">
                      ×
                    </button>
                  </div>
                ))}
              </div>
            )}
            <datalist id="headDatalist">
              {(allHeads||[]).map(h=><option key={h} value={h}/>)}
            </datalist>
          </section>

          {/* ── Fases e Alocação (Analistas + Heads) ── */}
          <section>
            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Fases e Percentuais</h3>
            <div className="space-y-2">
              {PHASES.map(ph=>{
                const phase    = phases[ph.key];
                const totalA   = totalPhasePct(phase);
                const totalH   = totalPhasePct({pcts: headPhases[ph.key].pcts});
                return (
                  <div key={ph.key} className="border border-slate-200 rounded-xl overflow-hidden">
                    {/* Phase header row */}
                    <div className="bg-slate-50 px-4 py-2.5 flex items-center gap-2 flex-wrap">
                      <span className="text-sm font-semibold text-slate-700 w-36 shrink-0">{ph.label}</span>
                      <div className="flex items-center gap-1.5">
                        <input type="date" value={phase.start} onChange={e=>updatePhaseField(ph.key,'start',e.target.value)}
                          className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                        <span className="text-slate-300 text-xs">→</span>
                        <input type="date" value={phase.end} onChange={e=>updatePhaseField(ph.key,'end',e.target.value)}
                          className="border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-indigo-300"/>
                      </div>
                      <div className="ml-auto flex items-center gap-2">
                        {totalA>0&&(
                          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${totalA>100?'bg-red-100 text-red-700':totalA>90?'bg-yellow-100 text-yellow-700':'bg-green-100 text-green-700'}`}>
                            Analistas: {Math.round(totalA)}%
                          </span>
                        )}
                        {totalH>0&&(
                          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${totalH>100?'bg-red-100 text-red-700':totalH>90?'bg-yellow-100 text-yellow-700':'bg-violet-100 text-violet-700'}`}>
                            Heads: {Math.round(totalH)}%
                          </span>
                        )}
                      </div>
                    </div>

                    {/* Per-analyst pct rows */}
                    {analysts.length>0&&(
                      <div className="divide-y divide-slate-50">
                        {analysts.map((a,idx)=>(
                          <div key={idx} className="flex items-center gap-3 px-4 py-2">
                            <span className="text-xs text-slate-500 flex-1 truncate">{a||`Analista ${idx+1}`}</span>
                            <div className="flex items-center gap-1.5 shrink-0">
                              <input type="number" min={0} max={200} step={5}
                                value={phase.pcts[idx]!==undefined?phase.pcts[idx]:''}
                                onChange={e=>updatePct(ph.key,idx,e.target.value)}
                                className="border border-slate-200 rounded-lg px-2 py-1 text-xs w-20 text-right focus:ring-1 focus:ring-indigo-300"
                                placeholder="0"/>
                              <span className="text-xs text-slate-400 w-4">%</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Per-head pct rows */}
                    {heads.length>0&&(
                      <>
                        {analysts.length>0&&<div className="border-t border-slate-100 mx-4"/>}
                        <div className="divide-y divide-slate-50">
                          {heads.map((h,idx)=>(
                            <div key={idx} className="flex items-center gap-3 px-4 py-2 bg-violet-50/30">
                              <span className="text-xs text-violet-600 font-medium w-4 shrink-0">H</span>
                              <span className="text-xs text-slate-500 flex-1 truncate">{h||`Head ${idx+1}`}</span>
                              <div className="flex items-center gap-1.5 shrink-0">
                                <input type="number" min={0} max={200} step={5}
                                  value={headPhases[ph.key].pcts[idx]!==undefined?headPhases[ph.key].pcts[idx]:''}
                                  onChange={e=>updateHeadPct(ph.key,idx,e.target.value)}
                                  className="border border-violet-200 rounded-lg px-2 py-1 text-xs w-20 text-right focus:ring-1 focus:ring-violet-300"
                                  placeholder="0"/>
                                <span className="text-xs text-slate-400 w-4">%</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </>
                    )}

                    {analysts.length===0&&heads.length===0&&(
                      <p className="px-4 py-2 text-xs text-slate-400 italic">Adicione analistas ou heads acima para definir %.</p>
                    )}
                  </div>
                );
              })}
            </div>
          </section>
        </div>

        {/* Sticky footer */}
        <div className="px-6 py-4 border-t border-slate-200 flex items-center justify-between gap-3 shrink-0 rounded-b-2xl bg-white flex-wrap">
          {/* SP sync toggle — only for NEW projects when SP connected */}
          {!isExistingSP && !isExistingLocal && isSpConnected ? (
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <div onClick={()=>setSyncToSP(v=>!v)}
                className={`relative w-9 h-5 rounded-full transition ${syncToSP?'bg-indigo-600':'bg-slate-300'}`}>
                <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${syncToSP?'translate-x-4':'translate-x-0.5'}`}/>
              </div>
              <span className="text-xs text-slate-600">
                {syncToSP ? '📋 Adicionar ao SharePoint (List_Pulse)' : '🗂️ Salvar apenas na ferramenta'}
              </span>
            </label>
          ) : (
            <p className="text-xs text-slate-400">
              {isExistingSP ? '💾 Salva no SharePoint + distribução no arquivo'
               : isExistingLocal ? '🗂️ Salva no arquivo compartilhado (alocacao_dist.json)'
               : '⚠️ Sem conexão — visível só nesta sessão'}
            </p>
          )}
          <div className="flex gap-2 ml-auto">
            <button onClick={onClose} className="border border-slate-300 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-slate-50 transition">
              Cancelar
            </button>
            <button onClick={handleSave} disabled={!title.trim()||saving}
              className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-5 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
              {saving?'⏳ Salvando...':(project?'💾 Salvar':'➕ Criar Projeto')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Analyst Detail Modal ─────────────────────────────────────────────────────
function AnalystDetailModal({analyst,allProjects,onClose,extraAllocations,onSaveExtras,vacations,onSaveVacations,entityType}) {
  const isHead = entityType==='head';

  // Analyst mode: projects where this person is an analyst, with their pct per phase
  // Head mode: projects where this person is Head_1/2/3, showing phase dates
  const grouped = isHead
    ? allProjects
        .filter(p=>_projHeads(p).includes(analyst))
        .map(proj=>{
          const hidx=_projHeads(proj).indexOf(analyst);
          return {
            proj,
            phases: PHASES.map(ph=>{
              const hp=proj.headPhases?.[ph.key];
              return {...ph, phase:hp, pct:hp?.pcts?.[hidx]||0};
            }).filter(ph=>ph.phase?.start&&ph.phase?.end),
          };
        })
        .filter(g=>g.phases.length>0)
    : allProjects.filter(p=>p.analysts.includes(analyst)).map(proj=>{
        const idx=proj.analysts.indexOf(analyst);
        const phases=PHASES.map(ph=>({
          ...ph, phase:proj.phases[ph.key], pct:proj.phases[ph.key]?.pcts?.[idx]||0,
        })).filter(ph=>ph.phase?.start&&ph.phase?.end&&ph.pct>0);
        return {proj,phases};
      }).filter(g=>g.phases.length>0);

  const myExtras = (extraAllocations||[]).filter(e=>e.analyst===analyst);

  const [addMode,    setAddMode]    = useState(false);
  const [form,       setForm]       = useState({projId:'',projTitle:'',client:'',start:'',end:'',pct:''});
  const [formErr,    setFormErr]    = useState('');
  const [extraSaving,setExtraSaving]= useState(false);
  const [extraSaved, setExtraSaved] = useState(false);
  const [extraErr,   setExtraErr]   = useState('');

  // Vacation state
  const myVacations = (vacations||[]).filter(v=>v.analyst===analyst);
  const [vacMode,    setVacMode]    = useState(false);
  const [vacForm,    setVacForm]    = useState({start:'',end:''});
  const [vacFormErr, setVacFormErr] = useState('');
  const [vacSaving,  setVacSaving]  = useState(false);
  const [vacSaved,   setVacSaved]   = useState(false);
  const [vacErr,     setVacErr]     = useState('');

  async function handleVacAdd() {
    if (!vacForm.start||!vacForm.end)       { setVacFormErr('Informe início e fim.'); return; }
    const s=parseSPDate(vacForm.start), e=parseSPDate(vacForm.end);
    if (!s||!e||s>e)                        { setVacFormErr('Período inválido — início deve ser antes do fim.'); return; }
    const entry = {
      id:`vac-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      analyst, start:vacForm.start, end:vacForm.end,
    };
    const newList=[...(vacations||[]),entry];
    setVacSaving(true); setVacErr('');
    try {
      await onSaveVacations(newList);
      setVacForm({start:'',end:''}); setVacFormErr(''); setVacMode(false);
      setVacSaved(true); setTimeout(()=>setVacSaved(false),3000);
    } catch(e) { setVacErr('Erro ao salvar: '+e.message); }
    finally { setVacSaving(false); }
  }

  async function handleVacDelete(id) {
    const newList=(vacations||[]).filter(v=>v.id!==id);
    setVacSaving(true); setVacErr('');
    try {
      await onSaveVacations(newList);
      setVacSaved(true); setTimeout(()=>setVacSaved(false),3000);
    } catch(e) { setVacErr('Erro ao remover: '+e.message); }
    finally { setVacSaving(false); }
  }

  function handleFormChange(field,val) {
    if (field==='projId') {
      const proj=allProjects.find(p=>p.id===val);
      setForm(f=>({...f,projId:val,projTitle:proj?.title||'',client:proj?.client||''}));
    } else {
      setForm(f=>({...f,[field]:val}));
    }
  }

  async function handleAdd() {
    if (!form.projId)                               { setFormErr('Selecione um projeto.'); return; }
    if (!form.start||!form.end)                     { setFormErr('Informe início e fim.'); return; }
    const pctN=Number(form.pct);
    if (!form.pct||isNaN(pctN)||pctN<=0||pctN>200) { setFormErr('Percentual inválido (1–200).'); return; }
    const s=parseSPDate(form.start), e=parseSPDate(form.end);
    if (!s||!e||s>e)                                { setFormErr('Período inválido — início deve ser antes do fim.'); return; }
    const newEntry = {
      id:`ea-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      analyst, projId:form.projId, projTitle:form.projTitle, client:form.client,
      start:form.start, end:form.end, pct:Math.round(pctN),
    };
    const newList = [...(extraAllocations||[]), newEntry];
    setExtraSaving(true); setExtraErr('');
    try {
      await onSaveExtras(newList);
      setForm({projId:'',projTitle:'',client:'',start:'',end:'',pct:''});
      setFormErr(''); setAddMode(false);
      setExtraSaved(true); setTimeout(()=>setExtraSaved(false),3000);
    } catch(e) { setExtraErr('Erro ao salvar: '+e.message); }
    finally { setExtraSaving(false); }
  }

  async function handleDelete(id) {
    const newList = (extraAllocations||[]).filter(e=>e.id!==id);
    setExtraSaving(true); setExtraErr('');
    try {
      await onSaveExtras(newList);
      setExtraSaved(true); setTimeout(()=>setExtraSaved(false),3000);
    } catch(e) { setExtraErr('Erro ao remover: '+e.message); }
    finally { setExtraSaving(false); }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto mx-4" onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="sticky top-0 bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
          <div>
            <h2 className="text-lg font-bold text-slate-800">{analyst}</h2>
            <p className="text-xs text-slate-400">
              {grouped.length} projeto(s) principal(is)
              {myExtras.length>0&&` · ${myExtras.length} alocação(ões) extra(s)`}
            </p>
          </div>
